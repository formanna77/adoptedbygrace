    <title>Moses & Pharaoh: God's Sovereign Election to Mercy and Hardening</title>
    <style>
        :root {
            --bg-deep: #0a0a0f;
            --bg-card: #12121a;
            --bg-card-hover: #1a1a2e;
            --accent-gold: #d4a254;
            --accent-ember: #e8642c;
            --accent-violet: #8b5cf6;
            --text-primary: #f0ece4;
            --text-secondary: #9a958c;
            --text-muted: #807b75;
            --border-subtle: rgba(212, 162, 84, 0.12);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-primary);
            line-height: 1.75;
            letter-spacing: 0.3px;
        }
        
        .breadcrumb-
        .breadcrumb-
        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-gold), var(--accent-violet), var(--accent-ember));
            z-index: 99;
        }
        main {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }
        .hero {
            padding: 4rem 0;
            border-bottom: 1px solid var(--border-subtle);
            margin-bottom: 3rem;
        }
        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, var(--accent-gold), var(--accent-violet));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .hero p {
            font-size: 1.1rem;
            color: var(--text-secondary);
            max-width: 700px;
            line-height: 1.8;
        }
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2rem;
            }
            .hero {
                padding: 2rem 0;
            }
        }
        .toc {
            background-color: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            padding: 2rem;
            margin: 3rem 0;
        }
        .toc h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: var(--accent-gold);
        }
        .toc ol {
            list-style-position: inside;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        .toc li {
            color: var(--text-secondary);
        }
        .toc a {
            color: var(--accent-gold);
            text-decoration: none;
            font-weight: 500;
        }
        .toc a:hover {
            text-decoration: underline;
        }
        @media (max-width: 768px) {
            .toc ol {
                grid-template-columns: 1fr;
            }
        }
        section {
            margin: 3.5rem 0;
            scroll-margin-top: 100px;
        }
        h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: var(--accent-gold);
        }
        h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            margin-top: 2rem;
            margin-bottom: 1rem;
            color: var(--accent-violet);
        }
        h4 {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            margin-top: 1.5rem;
            margin-bottom: 0.75rem;
            color: var(--text-primary);
        }
        p {
            margin-bottom: 1.25rem;
            color: var(--text-primary);
        }
        .scripture-block {
            background-color: var(--bg-card);
            border-left: 4px solid var(--accent-gold);
            padding: 1.5rem;
            margin: 2rem 0;
            border-radius: 4px;
            font-style: italic;
        }
        .scripture-ref {
            display: block;
            font-weight: 600;
            color: var(--accent-gold);
            margin-top: 0.75rem;
            font-style: normal;
            font-size: 0.9rem;
        }
        .hebrew {
            font-family: 'JetBrains Mono', monospace;
            color: var(--accent-violet);
            font-weight: 600;
            background-color: rgba(139, 92, 246, 0.1);
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 1rem;
        }
        .greek {
            font-family: 'JetBrains Mono', monospace;
            color: var(--accent-ember);
            font-weight: 600;
            background-color: rgba(232, 100, 44, 0.1);
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 1rem;
        }
        .transliteration {
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-secondary);
            font-size: 0.95rem;
        }
        strong {
            color: var(--accent-gold);
            font-weight: 700;
        }
        em {
            color: var(--text-secondary);
            font-style: italic;
        }
        ul, ol {
            margin-left: 2rem;
            margin-bottom: 1.25rem;
        }
        li {
            margin-bottom: 0.75rem;
            color: var(--text-primary);
        }
        .witness-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1rem;
        }
        .witness-card strong {
            color: var(--accent-gold);
        }
        .cross-ref {
            background-color: rgba(139, 92, 246, 0.08);
            border-left: 3px solid var(--accent-violet);
            padding: 1rem 1.25rem;
            margin: 1.5rem 0;
            border-radius: 4px;
        }
        .cross-ref h4 {
            margin-top: 0;
            color: var(--accent-violet);
        }
        .cross-ref a {
            color: var(--accent-gold);
            text-decoration: none;
            font-weight: 600;
        }
        .cross-ref a:hover {
            text-decoration: underline;
        }
        .objection-box {
            background-color: rgba(232, 100, 44, 0.08);
            border-left: 3px solid var(--accent-ember);
            padding: 1rem 1.25rem;
            margin: 1.5rem 0;
            border-radius: 4px;
        }
        .objection-box strong {
            color: var(--accent-ember);
        }
        .continue-exploring {
            background-color: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            padding: 2rem;
            margin: 4rem 0 2rem;
        }
        .continue-exploring h3 {
            margin-top: 0;
            color: var(--accent-gold);
        }
        .explore-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 1.5rem;
            margin-top: 1.5rem;
        }
        .explore-card {
            background-color: var(--bg-card-hover);
            border: 1px solid var(--border-subtle);
            padding: 1.25rem;
            border-radius: 6px;
            text-decoration: none;
            color: var(--text-secondary);
            transition: all 0.3s ease;
        }
        .explore-card:hover {
            border-color: var(--accent-gold);
            background-color: var(--bg-deep);
            color: var(--accent-gold);
        }
        .explore-card h4 {
            color: var(--text-primary);
            margin-top: 0;
        }
        .explore-card p {
            font-size: 0.95rem;
            margin: 0.5rem 0 0;
        }footer {
            background-color: var(--bg-card);
            border-top: 1px solid var(--border-subtle);
            margin-top: 5rem;
            padding: 3rem 1.5rem;
        }
        .footer-container {
            max-width: 1100px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2rem;
            margin-bottom: 2rem;
        }
        .footer-section h4 {
            color: var(--accent-gold);
            margin-bottom: 1rem;
        }
        .footer-section ul {
            list-style: none;
            margin: 0;
        }
        .footer-section ul li {
            margin-bottom: 0.5rem;
        }
        .footer-section a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.3s ease;
        }
        .footer-section a:hover {
            color: var(--accent-gold);
        }
        .footer-copyright {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border-subtle);
            max-width: 1100px;
            margin: 0 auto;
        }

/* ========== FOCUS STYLES ========== */
*:focus-visible { outline: 2px solid var(--accent-gold); outline-offset: 2px; border-radius: 2px; }
a:focus-visible { outline-offset: 3px; }
button:focus-visible, .tab-btn:focus-visible, .verse-badge:focus-visible { outline-offset: 2px; }

/* ========== SOCIAL SHARING ========== */
.share-buttons { display: flex; gap: 0.75rem; align-items: center; margin: 2rem 0; padding: 1.5rem; background: var(--bg-card, #12121a); border: 1px solid rgba(212, 162, 84, 0.12); border-radius: 8px; }
.share-buttons .share-label { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.15em; color: #9a958c; margin-right: 0.5rem; }
.share-btn { display: inline-flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 50%; border: 1px solid rgba(212, 162, 84, 0.2); background: transparent; color: #d4a254; text-decoration: none; font-size: 0.9rem; transition: all 0.3s ease; cursor: pointer; }
.share-btn:hover { background: rgba(212, 162, 84, 0.12); border-color: #d4a254; transform: translateY(-2px); }
.share-btn svg { width: 18px; height: 18px; fill: currentColor; }
        @media (max-width: 480px) {
            h1 { font-size: 1.8rem; }
            .page-hero { padding: 4.5rem 1rem 1.5rem; }
            .page-hero::before { width: 250px; height: 250px; }
            .content-section { padding: 1.5rem 1rem; }
            footer { margin-top: 2rem; padding: 1.5rem 1rem; }
            .btn-primary, .btn-secondary { padding: 0.8rem 1.8rem; font-size: 0.9rem; }
            .card { padding: 1.5rem; }
            blockquote, .scripture-block { padding: 1.2rem 1.3rem; }
        }

    </style>
