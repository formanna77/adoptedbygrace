    <title>The CANNOT Page: Scripture's Testimony to Human Inability — Adopted by Grace</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-deep: #0a0a0f;
            --bg-card: #12121a;
            --accent-gold: #d4a254;
            --accent-ember: #e8642c;
            --accent-violet: #8b5cf6;
            --text-primary: #f0ece4;
            --text-secondary: #9a958c;
            --text-muted: #807b75;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* READING PROGRESS BAR */
        .reading-progress {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-violet), var(--accent-ember), var(--accent-gold));
            z-index: 999;
            width: 0%;
        }

        /* HEADER & NAV */
        header {
            background: linear-gradient(180deg, var(--bg-card) 0%, rgba(18, 18, 26, 0.95) 100%);
            border-bottom: 1px solid rgba(212, 162, 84, 0.1);
            position: sticky;
            top: 0;
            z-index: 50;
            backdrop-filter: blur(10px);
        }

        .nav-items {
            display: flex;
            list-style: none;
            gap: 2rem;
            align-items: center;
        }

        .nav-items a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            position: relative;
            transition: var(--transition);
        }

        .nav-items a:hover {
            color: var(--accent-gold);
        }

        .nav-items a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--accent-gold);
            transition: var(--transition);
        }

        .nav-items a:hover::after {
            width: 100%;
        }

        .dropdown {
            position: relative;
        }

        .dropdown-menu {
            display: none;
            position: absolute;
            top: 100%;
            right: 0;
            background: var(--bg-card);
            border: 1px solid rgba(212, 162, 84, 0.2);
            border-radius: 8px;
            min-width: 180px;
            padding: 0.5rem 0;
            margin-top: 0.5rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .dropdown:hover .dropdown-menu {
            display: block;
        }

        .dropdown-menu a {
            display: block;
            padding: 0.75rem 1.5rem;
            color: var(--text-secondary);
            text-decoration: none;
            transition: var(--transition);
            font-size: 0.9rem;
        }

        .dropdown-menu a:hover {
            background: rgba(212, 162, 84, 0.1);
            color: var(--accent-gold);
        }

        /* MAIN CONTENT */
        main {
            max-width: 1000px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }

        /* HERO SECTION */
        .hero {
            text-align: center;
            margin-bottom: 5rem;
            animation: fadeInDown 0.8s ease-out;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 8vw, 4rem);
            color: var(--accent-gold);
            margin-bottom: 1rem;
            line-height: 1.2;
            font-weight: 700;
            letter-spacing: -1px;
        }

        .hero-subtitle {
            font-size: 1.25rem;
            color: var(--text-secondary);
            margin-bottom: 2rem;
            line-height: 1.5;
        }

        .hero-divider {
            width: 100px;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-violet), var(--accent-gold));
            margin: 2rem auto;
            border-radius: 2px;
        }

        .intro-text {
            font-size: 1.1rem;
            color: var(--text-secondary);
            max-width: 700px;
            margin: 0 auto 3rem;
            line-height: 1.8;
        }

        /* NEVER GIVES UP BANNER */
        .never-gives-up-banner {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.2), rgba(232, 100, 44, 0.2));
            border-left: 4px solid var(--accent-violet);
            padding: 2rem;
            margin: 3rem 0;
            border-radius: 8px;
            backdrop-filter: blur(10px);
        }

        .never-gives-up-banner h3 {
            color: var(--accent-violet);
            font-size: 1rem;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .never-gives-up-banner p {
            color: var(--text-secondary);
            line-height: 1.7;
        }

        /* VERSE CARDS */
        .verses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2rem;
            margin: 4rem 0;
        }

        .verse-card {
            background: linear-gradient(135deg, rgba(18, 18, 26, 0.8), rgba(18, 18, 26, 0.5));
            border: 1px solid rgba(212, 162, 84, 0.15);
            border-radius: 12px;
            padding: 2rem;
            transition: var(--transition);
            overflow: hidden;
            position: relative;
        }

        .verse-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-violet), var(--accent-gold));
            opacity: 0;
            transition: var(--transition);
        }

        .verse-card:hover {
            border-color: rgba(212, 162, 84, 0.4);
            transform: translateY(-8px);
            background: linear-gradient(135deg, rgba(18, 18, 26, 0.95), rgba(18, 18, 26, 0.7));
        }

        .verse-card:hover::before {
            opacity: 1;
        }

        .verse-category {
            color: var(--accent-violet);
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.75rem;
        }

        .verse-card h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            color: var(--accent-gold);
            margin-bottom: 1rem;
            line-height: 1.3;
        }

        .verse-text {
            background: rgba(0, 0, 0, 0.3);
            padding: 1.25rem;
            border-left: 3px solid var(--accent-ember);
            margin-bottom: 1.5rem;
            border-radius: 6px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.95rem;
            color: var(--text-secondary);
            line-height: 1.7;
            font-style: italic;
        }

        .verse-reference {
            color: var(--accent-gold);
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            text-decoration: none;
            display: inline-block;
        }

        .verse-reference:hover {
            text-decoration: underline;
        }

        .meditation {
            color: var(--text-secondary);
            line-height: 1.8;
            font-size: 0.95rem;
        }

        .meditation strong {
            color: var(--text-primary);
        }

        /* CONCLUSION SECTION */
        .conclusion-section {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.1), rgba(232, 100, 44, 0.1));
            border: 2px solid rgba(212, 162, 84, 0.2);
            border-radius: 12px;
            padding: 3rem;
            margin: 5rem 0;
            text-align: center;
        }

        .conclusion-section h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: var(--accent-gold);
            margin-bottom: 1.5rem;
            line-height: 1.3;
        }

        .conclusion-text {
            font-size: 1.1rem;
            color: var(--text-secondary);
            line-height: 1.8;
            max-width: 700px;
            margin: 0 auto;
        }

        .conclusion-text p {
            margin-bottom: 1.5rem;
        }

        .grace-highlight {
            color: var(--accent-violet);
            font-weight: 600;
            font-style: italic;
        }

        /* FURTHER READING */
        .further-reading {
            margin: 5rem 0;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.75rem;
            color: var(--accent-gold);
            margin-bottom: 2rem;
            text-align: center;
        }

        .reading-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .reading-card {
            background: var(--bg-card);
            border: 1px solid rgba(212, 162, 84, 0.2);
            border-radius: 10px;
            padding: 1.75rem;
            text-decoration: none;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
        }

        .reading-card:hover {
            border-color: var(--accent-gold);
            transform: translateY(-5px);
            background: rgba(212, 162, 84, 0.05);
        }

        .reading-card h4 {
            color: var(--accent-gold);
            font-size: 1.1rem;
            margin-bottom: 0.75rem;
            font-weight: 600;
        }

        .reading-card p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.6;
            flex-grow: 1;
            margin-bottom: 1rem;
        }

        .reading-card-arrow {
            color: var(--accent-ember);
            font-weight: 600;
            font-size: 0.9rem;
        }

        /* BACK TO TOP *//* FOOTER */
        footer {
            background: var(--bg-card);
            border-top: 1px solid rgba(212, 162, 84, 0.1);
            padding: 3rem 2rem;
            margin-top: 6rem;
        }

        .footer-content {
            max-width: 1000px;
            margin: 0 auto;
            text-align: center;
            color: var(--text-secondary);
        }

        .footer-content p {
            margin-bottom: 1rem;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 1.5rem;
            flex-wrap: wrap;
        }

        .footer-links a {
            color: var(--accent-gold);
            text-decoration: none;
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .footer-links a:hover {
            text-decoration: underline;
        }

        /* FOCUS STYLES */
        a:focus-visible,
        button:focus-visible {
            outline: 2px solid var(--accent-gold);
            outline-offset: 2px;
            border-radius: 4px;
        }

        /* MOBILE RESPONSIVE */
        @media (max-width: 768px) {

            .nav-items {
                display: none;
            }

            .hero h1 {
                font-size: 1.75rem;
            }

            .verses-grid {
                grid-template-columns: 1fr;
            }

            .conclusion-section {
                padding: 2rem;
            }

            .conclusion-section h2 {
                font-size: 1.5rem;
            }

            main {
                padding: 2rem 1rem;
            }

            .reading-cards {
                grid-template-columns: 1fr;
            }
        }

    </style>
