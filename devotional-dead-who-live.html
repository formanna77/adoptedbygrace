    <title>The Dead Who Live — What Does It Mean to Be Spiritually Dead? | Adopted by Grace</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        *:focus-visible {
            outline: 2px solid var(--accent-gold);
            outline-offset: 2px;
        }

        :root {
            --bg-deep: #0a0a0f;
            --bg-card: #12121a;
            --bg-card-hover: #1a1a2e;
            --accent-gold: #d4a254;
            --accent-ember: #e8642c;
            --accent-violet: #8b5cf6;
            --text-primary: #f0ece4;
            --text-secondary: #9a958c;
            --text-muted: #807b75;
            --border-subtle: rgba(212, 162, 84, 0.12);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-primary);
            line-height: 1.8;
            letter-spacing: 0.3px;
        }

        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-gold), var(--accent-ember), var(--accent-violet));
            z-index: 999;
            width: 0%;
        }

        main {
            max-width: 800px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        .breadcrumb {
            margin-bottom: 40px;
        }

        .breadcrumb a {
            color: var(--accent-gold);
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.3s ease;
        }

        .breadcrumb a:hover {
            color: var(--accent-ember);
        }

        .article-meta {
            margin-bottom: 50px;
            text-align: center;
            padding-bottom: 30px;
            border-bottom: 1px solid var(--border-subtle);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--text-primary);
            line-height: 1.2;
        }

        .article-meta p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-top: 10px;
        }

        h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 700;
            margin-top: 50px;
            margin-bottom: 25px;
            color: var(--accent-gold);
        }

        h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            font-weight: 600;
            margin-top: 35px;
            margin-bottom: 18px;
            color: var(--text-primary);
        }

        p {
            margin-bottom: 20px;
            text-align: justify;
        }

        .verse-block {
            background-color: var(--bg-card);
            border-left: 4px solid var(--accent-gold);
            padding: 30px;
            margin: 40px 0;
            font-style: italic;
            text-align: center;
            color: var(--text-primary);
            line-height: 1.9;
        }

        .verse-block cite {
            display: block;
            margin-top: 15px;
            font-style: normal;
            font-size: 0.9rem;
            color: var(--accent-gold);
            letter-spacing: 0.5px;
        }

        blockquote {
            background-color: var(--bg-card);
            border-left: 4px solid var(--accent-violet);
            padding: 20px 25px;
            margin: 30px 0;
            font-style: italic;
            color: var(--text-secondary);
        }

        blockquote cite {
            display: block;
            margin-top: 10px;
            font-style: normal;
            color: var(--accent-violet);
            font-size: 0.9rem;
        }

        .pull-quote {
            background-color: rgba(212, 162, 84, 0.08);
            border-left: 4px solid var(--accent-gold);
            padding: 20px 25px;
            margin: 30px 0;
            font-style: italic;
            color: var(--accent-gold);
            font-size: 1.05rem;
            line-height: 1.6;
        }

        .pastoral-whisper {
            background-color: rgba(139, 92, 246, 0.06);
            border-left: 4px solid var(--accent-violet);
            padding: 20px 25px;
            margin: 30px 0;
            font-style: normal;
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .related-links {
            background-color: var(--bg-card);
            padding: 30px;
            margin: 50px 0;
            border: 1px solid var(--border-subtle);
        }

        .related-links h3 {
            margin-top: 0;
            color: var(--accent-gold);
        }

        .related-links ul {
            list-style: none;
            margin-top: 15px;
        }

        .related-links li {
            margin-bottom: 12px;
        }

        .related-links a {
            color: var(--accent-gold);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .related-links a:hover {
            color: var(--accent-ember);
        }

        .closing-prayer {
            background-color: var(--bg-card);
            border: 1px solid var(--border-subtle);
            padding: 35px;
            margin: 50px 0;
            font-style: italic;
            text-align: center;
            line-height: 2;
        }

        .share-buttons {
            display: flex;
            align-items: center;
            gap: 15px;
            margin: 50px 0;
            padding-top: 30px;
            border-top: 1px solid var(--border-subtle);
        }

        .share-label {
            color: var(--text-secondary);
            font-size: 0.95rem;
            font-weight: 500;
        }

        .share-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            background-color: var(--bg-card);
            border: 1px solid var(--border-subtle);
            color: var(--accent-gold);
            text-decoration: none;
            border-radius: 4px;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .share-btn:hover {
            background-color: var(--bg-card-hover);
            color: var(--accent-ember);
            border-color: var(--accent-gold);
        }footer {
            background-color: var(--bg-card);
            border-top: 1px solid var(--border-subtle);
            margin-top: 5rem;
            padding: 60px 20px 30px;
        }

        .footer-container {
            max-width: 1200px; width: 100%;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 40px;
            margin-bottom: 40px;
        }

        .footer-section h4 {
            font-family: 'Playfair Display', serif;
            font-size: 1rem;
            font-weight: 700;
            color: var(--accent-gold);
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .footer-section ul {
            list-style: none;
        }

        .footer-section ul li {
            margin-bottom: 10px;
        }

        .footer-section a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .footer-section a:hover {
            color: var(--accent-gold);
        }

        .footer-copyright {
            text-align: center;
            padding-top: 30px;
            border-top: 1px solid var(--border-subtle);
            color: var(--text-muted);
            font-size: 0.85rem;
            max-width: 1200px; width: 100%;
            margin: 0 auto;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }

            h2 {
                font-size: 1.5rem;
            }

            main {
                padding: 40px 20px;
            }

            .verse-block {
                padding: 20px;
            }

            }
        @media (max-width: 480px) {
            h1 { font-size: 1.8rem; }
            .page-hero { padding: 4.5rem 1rem 1.5rem; }
            .page-hero::before { width: 250px; height: 250px; }
            .content-section { padding: 1.5rem 1rem; }
            footer { margin-top: 2rem; padding: 1.5rem 1rem; }
            .btn-primary, .btn-secondary { padding: 0.8rem 1.8rem; font-size: 0.9rem; }
            .card { padding: 1.5rem; }
            blockquote, .scripture-block { padding: 1.2rem 1.3rem; }
        }

    </style>
