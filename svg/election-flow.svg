<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-label="The Flow of Election: From God's eternal decree through the application of redemption — a visual showing that salvation originates entirely in God">
  <defs>
    <linearGradient id="ef-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#10101a"/>
    </linearGradient>
    <radialGradient id="ef-source" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#d4a254" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#d4a254" stop-opacity="0"/>
    </radialGradient>

    <filter id="ef-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5"/>
    </filter>

    <marker id="ef-arrow" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="8" markerHeight="5" orient="auto-start-reverse">
      <path d="M0 0 L10 3 L0 6 Z" fill="#d4a254" opacity="0.6"/>
    </marker>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&amp;family=Inter:wght@400;500&amp;family=JetBrains+Mono:wght@600&amp;display=swap');

      .ef-title { font-family: 'Playfair Display', serif; font-weight: 800; fill: #f0ece4; }
      .ef-label { font-family: 'Playfair Display', serif; font-weight: 700; }
      .ef-body { font-family: 'Inter', sans-serif; font-weight: 400; fill: #9a958c; }
      .ef-verse { font-family: 'JetBrains Mono', monospace; font-weight: 600; }
      .ef-mono { font-family: 'JetBrains Mono', monospace; }

      @keyframes ef-pulse {
        0%, 100% { opacity: 0.6; }
        50% { opacity: 1; }
      }
      @keyframes ef-flow-down {
        from { stroke-dashoffset: 16; }
        to { stroke-dashoffset: 0; }
      }

      .ef-node { animation: ef-pulse 3s ease-in-out infinite; }
      .ef-flow { stroke-dasharray: 8 8; animation: ef-flow-down 1.5s linear infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="550" fill="url(#ef-bg)"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" class="ef-mono" font-size="9" fill="#d4a254" opacity="0.5" letter-spacing="0.2em">THE DOCTRINES OF GRACE</text>
  <text x="450" y="62" text-anchor="middle" class="ef-title" font-size="24">The Flow of Election</text>
  <text x="450" y="82" text-anchor="middle" class="ef-body" font-size="11">Salvation flows downward from God to man — never upward from man to God</text>

  <!-- SOURCE: THE TRIUNE GOD -->
  <circle cx="450" cy="130" r="45" fill="url(#ef-source)" stroke="#d4a254" stroke-width="1.5"/>
  <circle cx="450" cy="130" r="45" fill="none" stroke="#d4a254" stroke-width="0.5" filter="url(#ef-glow)" opacity="0.3"/>
  <text x="450" y="124" text-anchor="middle" class="ef-label" font-size="13" fill="#d4a254">The Triune</text>
  <text x="450" y="140" text-anchor="middle" class="ef-label" font-size="13" fill="#d4a254">God</text>

  <!-- Three arrows down from God to Trinity roles -->
  <!-- Father → Election -->
  <line x1="410" y1="175" x2="220" y2="225" stroke="#d4a254" stroke-width="1" opacity="0.5" marker-end="url(#ef-arrow)"/>
  <!-- Son → Atonement -->
  <line x1="450" y1="175" x2="450" y2="225" stroke="#d4a254" stroke-width="1" opacity="0.5" marker-end="url(#ef-arrow)"/>
  <!-- Spirit → Application -->
  <line x1="490" y1="175" x2="680" y2="225" stroke="#d4a254" stroke-width="1" opacity="0.5" marker-end="url(#ef-arrow)"/>

  <!-- ROW 2: Trinity's roles -->
  <!-- Father: Election -->
  <rect x="130" y="230" width="180" height="65" rx="6" fill="#12121a" stroke="rgba(212,162,84,0.3)" stroke-width="1"/>
  <text x="220" y="252" text-anchor="middle" class="ef-label" font-size="12" fill="#d4a254">The Father Elects</text>
  <text x="220" y="268" text-anchor="middle" class="ef-body" font-size="10">Chose before the</text>
  <text x="220" y="280" text-anchor="middle" class="ef-body" font-size="10">foundation of the world</text>
  <text x="220" y="292" text-anchor="middle" class="ef-verse" font-size="8" fill="#d4a254" opacity="0.5">EPH 1:4</text>

  <!-- Son: Atones -->
  <rect x="360" y="230" width="180" height="65" rx="6" fill="#12121a" stroke="rgba(232,100,44,0.3)" stroke-width="1"/>
  <text x="450" y="252" text-anchor="middle" class="ef-label" font-size="12" fill="#e8642c">The Son Redeems</text>
  <text x="450" y="268" text-anchor="middle" class="ef-body" font-size="10">Laid down His life</text>
  <text x="450" y="280" text-anchor="middle" class="ef-body" font-size="10">for His sheep</text>
  <text x="450" y="292" text-anchor="middle" class="ef-verse" font-size="8" fill="#e8642c" opacity="0.5">JOHN 10:11</text>

  <!-- Spirit: Applies -->
  <rect x="590" y="230" width="180" height="65" rx="6" fill="#12121a" stroke="rgba(139,92,246,0.3)" stroke-width="1"/>
  <text x="680" y="252" text-anchor="middle" class="ef-label" font-size="12" fill="#8b5cf6">The Spirit Applies</text>
  <text x="680" y="268" text-anchor="middle" class="ef-body" font-size="10">Regenerates, illuminates,</text>
  <text x="680" y="280" text-anchor="middle" class="ef-body" font-size="10">seals the redeemed</text>
  <text x="680" y="292" text-anchor="middle" class="ef-verse" font-size="8" fill="#8b5cf6" opacity="0.5">TITUS 3:5</text>

  <!-- Arrows converging down to the elect -->
  <line x1="220" y1="298" x2="380" y2="350" stroke="#d4a254" stroke-width="1" opacity="0.4" class="ef-flow"/>
  <line x1="450" y1="298" x2="450" y2="350" stroke="#e8642c" stroke-width="1" opacity="0.4" class="ef-flow"/>
  <line x1="680" y1="298" x2="520" y2="350" stroke="#8b5cf6" stroke-width="1" opacity="0.4" class="ef-flow"/>

  <!-- ROW 3: Result in the elect -->
  <rect x="330" y="355" width="240" height="55" rx="6" fill="#12121a" stroke="rgba(212,162,84,0.25)" stroke-width="1.5"/>
  <text x="450" y="377" text-anchor="middle" class="ef-label" font-size="14" fill="#f0ece4">The Elect Receive</text>
  <text x="450" y="396" text-anchor="middle" class="ef-body" font-size="10">Regeneration → Faith → Justification → Adoption → Sanctification</text>

  <!-- Arrow down to final result -->
  <line x1="450" y1="413" x2="450" y2="440" stroke="#d4a254" stroke-width="1" opacity="0.4" class="ef-flow"/>

  <!-- ROW 4: Glorification -->
  <rect x="350" y="445" width="200" height="40" rx="6" fill="#12121a" stroke="rgba(139,92,246,0.3)" stroke-width="1.5"/>
  <text x="450" y="470" text-anchor="middle" class="ef-label" font-size="14" fill="#8b5cf6">Glorification</text>

  <!-- Side notes -->
  <!-- "NOT from man" -->
  <rect x="30" y="370" width="130" height="50" rx="4" fill="#12121a" stroke="rgba(90,86,80,0.2)" stroke-width="1"/>
  <text x="95" y="390" text-anchor="middle" class="ef-label" font-size="11" fill="#5a5650">NOT from man</text>
  <text x="95" y="406" text-anchor="middle" class="ef-body" font-size="9">"Not of works"</text>
  <text x="95" y="416" text-anchor="middle" class="ef-verse" font-size="7" fill="#5a5650">EPH 2:9</text>
  <!-- Crossed-out arrow -->
  <line x1="160" y1="395" x2="320" y2="380" stroke="#5a5650" stroke-width="1" opacity="0.3" stroke-dasharray="4 4"/>
  <text x="240" y="384" text-anchor="middle" font-size="16" fill="#5a5650" opacity="0.4">✕</text>

  <!-- "TO God's glory" -->
  <rect x="740" y="370" width="130" height="50" rx="4" fill="#12121a" stroke="rgba(212,162,84,0.2)" stroke-width="1"/>
  <text x="805" y="390" text-anchor="middle" class="ef-label" font-size="11" fill="#d4a254">TO God's Glory</text>
  <text x="805" y="406" text-anchor="middle" class="ef-body" font-size="9">"Soli Deo Gloria"</text>
  <text x="805" y="416" text-anchor="middle" class="ef-verse" font-size="7" fill="#d4a254" opacity="0.5">ROM 11:36</text>

  <!-- Bottom -->
  <text x="450" y="516" text-anchor="middle" font-family="'Playfair Display', serif" font-size="13" fill="#f0ece4" font-style="italic">"For from him and through him and to him are all things. To him be glory forever."</text>
  <text x="450" y="538" text-anchor="middle" class="ef-verse" font-size="10" fill="#d4a254" opacity="0.6" letter-spacing="0.1em">ROMANS 11:36</text>
</svg>