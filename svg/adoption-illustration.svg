<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="Adopted by Grace: From orphans to sons and daughters of the King — the beauty of spiritual adoption in Ephesians 1:5">
  <defs>
    <linearGradient id="ad-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#10101a"/>
    </linearGradient>
    <linearGradient id="ad-light" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#d4a254" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#d4a254" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="ad-glow" cx="0.5" cy="0.3" r="0.5">
      <stop offset="0%" stop-color="#d4a254" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#d4a254" stop-opacity="0"/>
    </radialGradient>
    <filter id="ad-soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
    </filter>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&amp;family=Inter:wght@400;500&amp;family=JetBrains+Mono:wght@600&amp;display=swap');

      .ad-title { font-family: 'Playfair Display', serif; font-weight: 800; fill: #f0ece4; }
      .ad-sub { font-family: 'Inter', sans-serif; fill: #9a958c; }
      .ad-label { font-family: 'Playfair Display', serif; font-weight: 700; }
      .ad-desc { font-family: 'Inter', sans-serif; font-weight: 400; fill: #9a958c; font-size: 11px; }
      .ad-verse { font-family: 'JetBrains Mono', monospace; font-weight: 600; }
      .ad-mono { font-family: 'JetBrains Mono', monospace; }

      @keyframes light-descend {
        0%, 100% { opacity: 0.08; }
        50% { opacity: 0.18; }
      }
      @keyframes doc-seal {
        0%, 100% { r: 12; }
        50% { r: 14; }
      }

      .light-beam { animation: light-descend 5s ease-in-out infinite; }
      .seal-pulse { animation: doc-seal 3s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#ad-bg)"/>

  <!-- Large ambient glow -->
  <ellipse cx="400" cy="200" rx="350" ry="250" fill="url(#ad-glow)"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" class="ad-mono" font-size="9" fill="#d4a254" opacity="0.5" letter-spacing="0.2em">EPHESIANS 1:5</text>
  <text x="400" y="68" text-anchor="middle" class="ad-title" font-size="26">Adopted by Grace</text>
  <text x="400" y="90" text-anchor="middle" class="ad-sub" font-size="12">From orphans in darkness to sons and daughters of the King</text>

  <!-- ===== LEFT PANEL: BEFORE — Orphaned ===== -->
  <g transform="translate(135, 160)">
    <!-- Dark background panel -->
    <rect x="-100" y="-20" width="200" height="250" rx="8" fill="#0e0e16" stroke="rgba(90,86,80,0.2)" stroke-width="1"/>

    <!-- Small solitary figure, hunched -->
    <circle cx="0" cy="60" r="16" fill="none" stroke="#5a5650" stroke-width="1.5" opacity="0.5"/>
    <path d="M-12 82 C-12 74 -6 70 0 72 C6 70 12 74 12 82" fill="none" stroke="#5a5650" stroke-width="1.5" opacity="0.5"/>
    <line x1="0" y1="88" x2="0" y2="115" stroke="#5a5650" stroke-width="1.5" opacity="0.5"/>
    <!-- Chains -->
    <circle cx="-18" cy="95" r="4" fill="none" stroke="#5a5650" stroke-width="1" opacity="0.4"/>
    <circle cx="-25" cy="100" r="4" fill="none" stroke="#5a5650" stroke-width="1" opacity="0.3"/>
    <circle cx="18" cy="95" r="4" fill="none" stroke="#5a5650" stroke-width="1" opacity="0.4"/>
    <circle cx="25" cy="100" r="4" fill="none" stroke="#5a5650" stroke-width="1" opacity="0.3"/>

    <!-- Label -->
    <text x="0" y="-2" text-anchor="middle" class="ad-label" font-size="14" fill="#5a5650">Before</text>
    <text x="0" y="150" text-anchor="middle" class="ad-desc" fill="#5a5650">"Dead in trespasses"</text>
    <text x="0" y="166" text-anchor="middle" class="ad-desc" fill="#5a5650">"Children of wrath"</text>
    <text x="0" y="182" text-anchor="middle" class="ad-desc" fill="#5a5650">"Without hope"</text>
    <text x="0" y="200" text-anchor="middle" class="ad-verse" font-size="9" fill="#5a5650" opacity="0.5">EPH 2:1-3, 12</text>
  </g>

  <!-- ===== CENTER: The Act of Adoption ===== -->
  <g transform="translate(400, 160)">
    <!-- Light beam descending -->
    <polygon points="0,-30 -60,220 60,220" fill="url(#ad-light)" class="light-beam"/>

    <!-- Adoption document / decree -->
    <rect x="-50" y="20" width="100" height="130" rx="4" fill="#12121a" stroke="#d4a254" stroke-width="1.5"/>
    <!-- Decree text -->
    <text x="0" y="42" text-anchor="middle" class="ad-mono" font-size="7" fill="#d4a254" opacity="0.5" letter-spacing="0.1em">DECREE OF</text>
    <text x="0" y="58" text-anchor="middle" class="ad-label" font-size="14" fill="#d4a254">Adoption</text>
    <line x1="-30" y1="68" x2="30" y2="68" stroke="#d4a254" stroke-width="0.5" opacity="0.3"/>
    <!-- Decree content lines -->
    <text x="0" y="84" text-anchor="middle" font-family="'Inter', sans-serif" font-size="8" fill="#9a958c">"He predestined us</text>
    <text x="0" y="96" text-anchor="middle" font-family="'Inter', sans-serif" font-size="8" fill="#9a958c">for adoption to himself</text>
    <text x="0" y="108" text-anchor="middle" font-family="'Inter', sans-serif" font-size="8" fill="#9a958c">as sons through</text>
    <text x="0" y="120" text-anchor="middle" font-family="'Inter', sans-serif" font-size="8" fill="#d4a254">Jesus Christ"</text>
    <!-- Seal -->
    <circle cx="25" cy="138" r="12" fill="none" stroke="#d4a254" stroke-width="1.5" class="seal-pulse" opacity="0.6"/>
    <text x="25" y="142" text-anchor="middle" font-family="serif" font-size="10" fill="#d4a254" opacity="0.5">✦</text>

    <!-- Labels -->
    <text x="0" y="-8" text-anchor="middle" class="ad-label" font-size="14" fill="#d4a254">The Decree</text>
    <text x="0" y="180" text-anchor="middle" class="ad-desc">Signed in eternity past</text>
    <text x="0" y="196" text-anchor="middle" class="ad-desc">Sealed by the Spirit</text>
    <text x="0" y="212" text-anchor="middle" class="ad-desc">Paid for by the Son</text>
    <text x="0" y="230" text-anchor="middle" class="ad-verse" font-size="9" fill="#d4a254" opacity="0.5">EPH 1:5, 13-14</text>
  </g>

  <!-- ===== RIGHT PANEL: AFTER — Adopted ===== -->
  <g transform="translate(665, 160)">
    <!-- Warm background panel -->
    <rect x="-100" y="-20" width="200" height="250" rx="8" fill="#12121a" stroke="rgba(212,162,84,0.2)" stroke-width="1"/>

    <!-- Figure standing tall with crown -->
    <circle cx="0" cy="50" r="16" fill="none" stroke="#d4a254" stroke-width="1.5"/>
    <!-- Crown on head -->
    <path d="M-10 38 L-6 30 L-2 36 L0 28 L2 36 L6 30 L10 38" fill="none" stroke="#d4a254" stroke-width="1" opacity="0.7"/>
    <!-- Body - standing tall -->
    <line x1="0" y1="66" x2="0" y2="115" stroke="#d4a254" stroke-width="1.5"/>
    <!-- Arms raised -->
    <path d="M-15 80 L0 90 L15 80" fill="none" stroke="#d4a254" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Robe -->
    <path d="M-12 115 L0 100 L12 115" fill="none" stroke="#d4a254" stroke-width="1" opacity="0.5"/>

    <!-- Radiating light -->
    <line x1="-28" y1="45" x2="-35" y2="40" stroke="#d4a254" stroke-width="0.8" opacity="0.3"/>
    <line x1="28" y1="45" x2="35" y2="40" stroke="#d4a254" stroke-width="0.8" opacity="0.3"/>
    <line x1="0" y1="28" x2="0" y2="20" stroke="#d4a254" stroke-width="0.8" opacity="0.3"/>

    <!-- Label -->
    <text x="0" y="-2" text-anchor="middle" class="ad-label" font-size="14" fill="#d4a254">After</text>
    <text x="0" y="150" text-anchor="middle" class="ad-desc" fill="#d4a254" opacity="0.8">"Heirs of God"</text>
    <text x="0" y="166" text-anchor="middle" class="ad-desc" fill="#d4a254" opacity="0.8">"Co-heirs with Christ"</text>
    <text x="0" y="182" text-anchor="middle" class="ad-desc" fill="#d4a254" opacity="0.8">"Abba, Father!"</text>
    <text x="0" y="200" text-anchor="middle" class="ad-verse" font-size="9" fill="#d4a254" opacity="0.5">ROM 8:15-17</text>
  </g>

  <!-- Arrows between panels -->
  <line x1="240" y1="280" x2="310" y2="280" stroke="#d4a254" stroke-width="1" opacity="0.4" stroke-dasharray="4 4"/>
  <path d="M305 276 L312 280 L305 284" fill="none" stroke="#d4a254" stroke-width="1" opacity="0.4"/>

  <line x1="490" y1="280" x2="560" y2="280" stroke="#d4a254" stroke-width="1" opacity="0.4" stroke-dasharray="4 4"/>
  <path d="M555 276 L562 280 L555 284" fill="none" stroke="#d4a254" stroke-width="1" opacity="0.4"/>

  <!-- Bottom verse -->
  <text x="400" y="440" text-anchor="middle" font-family="'Playfair Display', serif" font-size="14" fill="#f0ece4" font-style="italic">"See what kind of love the Father has given to us, that we should</text>
  <text x="400" y="460" text-anchor="middle" font-family="'Playfair Display', serif" font-size="14" fill="#f0ece4" font-style="italic">be called children of God; and so we are."</text>
  <text x="400" y="484" text-anchor="middle" class="ad-verse" font-size="10" fill="#d4a254" opacity="0.6" letter-spacing="0.1em">1 JOHN 3:1</text>
</svg>