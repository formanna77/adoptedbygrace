<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" role="img" aria-label="Irresistible Grace: The effectual call of the Spirit">
  <!-- Dove / Spirit descending with rays -->
  <defs>
    <linearGradient id="gg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6d3fc4"/>
    </linearGradient>
  </defs>
  <!-- Dove shape -->
  <path d="M24 18 C20 14 14 14 12 18 C10 22 16 24 24 28 C32 24 38 22 36 18 C34 14 28 14 24 18Z" fill="none" stroke="url(#gg)" stroke-width="1.5"/>
  <!-- Body -->
  <path d="M24 28 L24 36" stroke="#8b5cf6" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Rays from above -->
  <line x1="24" y1="4" x2="24" y2="10" stroke="#d4a254" stroke-width="1" opacity="0.5" stroke-linecap="round"/>
  <line x1="16" y1="6" x2="18" y2="11" stroke="#d4a254" stroke-width="1" opacity="0.4" stroke-linecap="round"/>
  <line x1="32" y1="6" x2="30" y2="11" stroke="#d4a254" stroke-width="1" opacity="0.4" stroke-linecap="round"/>
  <!-- Heart below (new heart) -->
  <path d="M24 42 C20 38 18 36 20 34 C21 33 23 34 24 36 C25 34 27 33 28 34 C30 36 28 38 24 42Z" fill="#8b5cf6" opacity="0.6"/>
</svg>