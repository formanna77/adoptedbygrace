<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" role="img" aria-label="Election: God's sovereign choice">
  <!-- A hand reaching down from above with a crown -->
  <defs>
    <linearGradient id="eg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4a254"/>
      <stop offset="100%" stop-color="#c49244"/>
    </linearGradient>
  </defs>
  <!-- Crown above -->
  <path d="M14 12 L18 6 L22 10 L24 4 L26 10 L30 6 L34 12 Z" fill="none" stroke="url(#eg)" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Hand pointing/choosing downward -->
  <path d="M24 16 L24 28" stroke="#d4a254" stroke-width="2" stroke-linecap="round"/>
  <path d="M20 24 L24 28 L28 24" fill="none" stroke="#d4a254" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Small figure below -->
  <circle cx="24" cy="36" r="3" fill="none" stroke="#d4a254" stroke-width="1.2" opacity="0.7"/>
  <line x1="24" y1="39" x2="24" y2="44" stroke="#d4a254" stroke-width="1.2" opacity="0.7"/>
</svg>