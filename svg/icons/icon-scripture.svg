  <line x1="12" y1="22" x2="21" y2="24" stroke="#d4a254" stroke-width="0.7" opacity="0.4"/>
  <line x1="12" y1="26" x2="21" y2="28" stroke="#d4a254" stroke-width="0.7" opacity="0.4"/>
  <line x1="12" y1="30" x2="21" y2="32" stroke="#d4a254" stroke-width="0.7" opacity="0.4"/>
  <!-- Text lines right page -->
  <line x1="27" y1="20" x2="36" y2="18" stroke="#d4a254" stroke-width="0.7" opacity="0.4"/>
  <line x1="27" y1="24" x2="36" y2="22" stroke="#d4a254" stroke-width="0.7" opacity="0.4"/>
