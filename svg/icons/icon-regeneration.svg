<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" role="img" aria-label="Regeneration: New birth, a heart of flesh for a heart of stone">
  <!-- Stone heart transforming to living heart -->
  <!-- Stone heart (left, cracked, gray) -->
  <path d="M14 24 C6 16 6 10 10 8 C13 6 15 8 16 12 C17 8 19 6 22 8 C26 10 26 16 14 24Z" fill="none" stroke="#5a5650" stroke-width="1.2" opacity="0.5"/>
  <line x1="16" y1="12" x2="14" y2="18" stroke="#5a5650" stroke-width="0.8" opacity="0.5"/>
  <!-- Arrow of transformation -->
  <line x1="22" y1="16" x2="28" y2="16" stroke="#d4a254" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M26 13 L29 16 L26 19" fill="none" stroke="#d4a254" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Living heart (right, red/warm, alive) -->
  <path d="M38 24 C30 16 30 10 34 8 C37 6 39 8 40 12 C41 8 43 6 46 8 C50 10 50 16 38 24Z" fill="none" stroke="#e8642c" stroke-width="1.5"/>
  <!-- Pulse lines emanating from living heart -->
  <path d="M32 28 L34 28 L36 24 L38 32 L40 26 L42 28 L44 28" fill="none" stroke="#e8642c" stroke-width="1" opacity="0.6"/>
  <!-- Ezekiel reference -->
  <text x="24" y="42" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="6" fill="#d4a254" opacity="0.5">EZ 36:26</text>
</svg>