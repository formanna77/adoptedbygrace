<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" role="img" aria-label="Adoption: Made sons and daughters of God">
  <!-- Family/Adoption: Large figure embracing small figure, with a document/seal -->
  <!-- Parent figure (God as Father) -->
  <circle cx="20" cy="10" r="4" fill="none" stroke="#d4a254" stroke-width="1.5"/>
  <path d="M12 18 C12 14 16 12 20 14 C24 12 28 14 28 18 L28 30 C28 32 26 34 24 34 L16 34 C14 34 12 32 12 30 Z" fill="none" stroke="#d4a254" stroke-width="1.5"/>
  <!-- Child figure (adopted child) -->
  <circle cx="32" cy="22" r="3" fill="none" stroke="#8b5cf6" stroke-width="1.2"/>
  <path d="M28 28 C28 26 30 24 32 25 C34 24 36 26 36 28 L36 36 L28 36 Z" fill="none" stroke="#8b5cf6" stroke-width="1.2"/>
  <!-- Embrace arc -->
  <path d="M28 20 C30 16 36 18 34 24" fill="none" stroke="#d4a254" stroke-width="1" opacity="0.5" stroke-dasharray="2 2"/>
  <!-- Seal/document at bottom -->
  <rect x="14" y="38" width="20" height="6" rx="1" fill="none" stroke="#d4a254" stroke-width="1" opacity="0.5"/>
  <circle cx="34" cy="41" r="2.5" fill="none" stroke="#d4a254" stroke-width="0.8" opacity="0.5"/>
</svg>