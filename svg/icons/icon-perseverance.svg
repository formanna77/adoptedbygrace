<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" role="img" aria-label="Perseverance of the Saints: Held in the Father's hand">
  <!-- Two cupped hands holding a figure -->
  <!-- Left hand -->
  <path d="M6 28 C6 20 12 14 18 18 L20 24" fill="none" stroke="#d4a254" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Right hand -->
  <path d="M42 28 C42 20 36 14 30 18 L28 24" fill="none" stroke="#d4a254" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Cupped bottom -->
  <path d="M6 28 C6 38 18 42 24 42 C30 42 42 38 42 28" fill="none" stroke="#d4a254" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Small figure held within -->
  <circle cx="24" cy="28" r="3.5" fill="none" stroke="#8b5cf6" stroke-width="1.2"/>
  <line x1="24" y1="31.5" x2="24" y2="37" stroke="#8b5cf6" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Seal / stamp above -->
  <circle cx="24" cy="12" r="5" fill="none" stroke="#d4a254" stroke-width="1" opacity="0.5"/>
  <text x="24" y="15" text-anchor="middle" font-family="serif" font-size="7" fill="#d4a254" opacity="0.6">✦</text>
</svg>