    <style>
        :root {
            --bg-deep: #0a0a0f;
            --bg-card: #12121a;
            --bg-card-hover: #1a1a2e;
            --accent-gold: #d4a254;
            --accent-ember: #e8642c;
            --accent-violet: #8b5cf6;
            --text-primary: #f0ece4;
            --text-secondary: #9a958c;
            --text-muted: #807b75;
            --border-subtle: rgba(212, 162, 84, 0.12);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-primary);
            line-height: 1.8;
            font-size: 16px;
        }

        .breadcrumb-

        .breadcrumb-

        main {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem 2rem 4rem;
        }

        .reading-progress {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background-color: var(--accent-gold);
            z-index: 99;
            transition: width 0.1s ease;
        }

        .page-header {
            margin-bottom: 3rem;
        }

        .page-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            font-weight: 800;
            color: var(--accent-gold);
            margin-bottom: 1rem;
            line-height: 1.1;
        }

        .page-header p {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
        }

        .meta-info {
            display: flex;
            gap: 2rem;
            font-size: 0.9rem;
            color: var(--text-muted);
            flex-wrap: wrap;
            margin-top: 1.5rem;
        }

        .section {
            margin-bottom: 3.5rem;
        }

        .section h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent-gold);
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-subtle);
            padding-bottom: 1rem;
        }

        .section h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            color: var(--accent-violet);
            margin: 2rem 0 1rem;
        }

        .scripture-block {
            background-color: var(--bg-card);
            border-left: 4px solid var(--accent-gold);
            padding: 1.5rem;
            margin: 1.5rem 0;
            border-radius: 4px;
            font-style: italic;
            color: var(--text-secondary);
            line-height: 1.8;
        }

        .scripture-ref {
            color: var(--accent-gold);
            font-weight: 600;
            display: block;
            margin-top: 0.8rem;
            font-style: normal;
        }

        .hebrew-study {
            background-color: var(--bg-card-hover);
            padding: 1.5rem;
            margin: 1.5rem 0;
            border-left: 4px solid var(--accent-violet);
            border-radius: 4px;
        }

        .hebrew-word {
            font-family: 'JetBrains Mono', monospace;
            color: var(--accent-gold);
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 1px;
            display: block;
            margin-bottom: 0.3rem;
        }

        .hebrew-trans {
            font-family: 'JetBrains Mono', monospace;
            color: var(--accent-violet);
            font-size: 0.95rem;
            margin-bottom: 0.5rem;
            display: block;
        }

        .hebrew-meaning {
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }

        .objection-block {
            background-color: var(--bg-card);
            border-left: 4px solid var(--accent-ember);
            padding: 1.5rem;
            margin: 1.5rem 0;
            border-radius: 4px;
        }

        .objection-label {
            color: var(--accent-ember);
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
            display: block;
        }

        .objection-text {
            color: var(--text-primary);
            margin-bottom: 1rem;
            font-style: italic;
        }

        .answer-label {
            color: var(--accent-gold);
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
            display: block;
        }

        .key-point {
            background-color: var(--bg-card);
            border-radius: 4px;
            padding: 1rem 1.5rem;
            margin: 1rem 0;
            border-left: 4px solid var(--accent-gold);
        }

        ul, ol {
            margin-left: 1.5rem;
            margin-bottom: 1.5rem;
        }

        li {
            margin-bottom: 0.8rem;
        }

        .witnesses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 1.5rem;
            margin: 2rem 0;
        }

        .witness-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-subtle);
            padding: 1.5rem;
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        .witness-card:hover {
            background-color: var(--bg-card-hover);
            border-color: var(--accent-gold);
        }

        .witness-name {
            font-family: 'Playfair Display', serif;
            color: var(--accent-gold);
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .witness-desc {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .nav-link-item {
            background-color: var(--bg-card);
            border: 1px solid var(--border-subtle);
            padding: 1rem 1.5rem;
            border-radius: 4px;
            text-decoration: none;
            color: var(--text-primary);
            transition: all 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-link-item:hover {
            background-color: var(--bg-card-hover);
            border-color: var(--accent-gold);
            color: var(--accent-gold);
        }

        .nav-link-title {
            font-weight: 600;
        }

        .continue-exploring {
            margin-top: 3rem;
            padding: 2rem;
            background-color: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 4px;
        }

        .continue-exploring h3 {
            color: var(--accent-gold);
            margin-bottom: 1.5rem;
        }

        footer {
            background-color: var(--bg-card);
            border-top: 1px solid var(--border-subtle);
            margin-top: 5rem;
            padding: 3rem 2rem 2rem;
        }

        .footer-container {
            max-width: 1200px; width: 100%;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 3rem;
            margin-bottom: 2rem;
        }

        .footer-section h4 {
            color: var(--accent-gold);
            font-family: 'Playfair Display', serif;
            margin-bottom: 1rem;
        }

        .footer-section ul {
            list-style: none;
            margin-left: 0;
        }

        .footer-section a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .footer-section a:hover {
            color: var(--accent-gold);
        }

        .footer-copyright {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            border-top: 1px solid var(--border-subtle);
            padding-top: 2rem;
            max-width: 1200px; width: 100%;
            margin: 0 auto;
        }

        @media (max-width: 768px) {
            .page-header h1 {
                font-size: 2rem;
            }

            .section h2 {
                font-size: 1.6rem;
            }

            .meta-info {
                gap: 1rem;
            }
        }

/* ========== FOCUS STYLES ========== */
*:focus-visible { outline: 2px solid var(--accent-gold); outline-offset: 2px; border-radius: 2px; }
a:focus-visible { outline-offset: 3px; }
button:focus-visible, .tab-btn:focus-visible, .verse-badge:focus-visible { outline-offset: 2px; }

/* ========== SOCIAL SHARING ========== */
.share-buttons { display: flex; gap: 0.75rem; align-items: center; margin: 2rem 0; padding: 1.5rem; background: var(--bg-card, #12121a); border: 1px solid rgba(212, 162, 84, 0.12); border-radius: 8px; }
.share-buttons .share-label { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.15em; color: #9a958c; margin-right: 0.5rem; }
.share-btn { display: inline-flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 50%; border: 1px solid rgba(212, 162, 84, 0.2); background: transparent; color: #d4a254; text-decoration: none; font-size: 0.9rem; transition: all 0.3s ease; cursor: pointer; }
.share-btn:hover { background: rgba(212, 162, 84, 0.12); border-color: #d4a254; transform: translateY(-2px); }
.share-btn svg { width: 18px; height: 18px; fill: currentColor; }
        @media (max-width: 480px) {
            h1 { font-size: 1.8rem; }
            .page-hero { padding: 4.5rem 1rem 1.5rem; }
            .page-hero::before { width: 250px; height: 250px; }
            .content-section { padding: 1.5rem 1rem; }
            footer { margin-top: 2rem; padding: 1.5rem 1rem; }
            .btn-primary, .btn-secondary { padding: 0.8rem 1.8rem; font-size: 0.9rem; }
            .card { padding: 1.5rem; }
            blockquote, .scripture-block { padding: 1.2rem 1.3rem; }
        }

    </style>
