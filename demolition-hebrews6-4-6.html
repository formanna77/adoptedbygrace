    <title>Hebrews 6:4-6 — Verse Demolition #10 | Adopted by Grace</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-deep: #0a0a0f;
            --bg-card: #12121a;
            --bg-card-hover: #1a1a2e;
            --accent-gold: #d4a254;
            --accent-ember: #e8642c;
            --accent-violet: #8b5cf6;
            --text-primary: #f0ece4;
            --text-secondary: #9a958c;
            --text-muted: #807b75;
            --border-subtle: rgba(212, 162, 84, 0.12);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-primary);
            line-height: 1.8;
        }

        a {
            color: var(--accent-gold);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        a:hover {
            color: var(--accent-ember);
        }

        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-gold), var(--accent-ember), var(--accent-violet));
            z-index: 1000;
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.1s ease;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            margin-top: 2rem;
            margin-bottom: 1rem;
            color: var(--text-primary);
        }

        h1 {
            font-size: 2.5rem;
            line-height: 1.2;
            margin-top: 0;
        }

        h2 {
            font-size: 1.8rem;
            border-bottom: 1px solid var(--border-subtle);
            padding-bottom: 1rem;
        }

        h3 {
            font-size: 1.4rem;
        }

        h4 {
            font-size: 1.1rem;
        }

        p {
            margin-bottom: 1rem;
            text-align: justify;
        }

        ul, ol {
            margin-left: 1.5rem;
            margin-bottom: 1rem;
        }

        li {
            margin-bottom: 0.5rem;
        }

        em, strong {
            color: var(--accent-gold);
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 2rem;
            color: var(--accent-gold);
            font-size: 0.95rem;
        }

        .back-link:hover {
            color: var(--accent-ember);
        }

        .series-label {
            display: inline-block;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }

        .tier-badge {
            display: inline-block;
            background-color: var(--bg-card);
            border: 1px solid var(--border-subtle);
            padding: 0.5rem 1rem;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: var(--accent-violet);
            margin-bottom: 1rem;
        }

        .topic-label {
            display: block;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

            border-radius: 4px;

            margin-bottom: 0.75rem;
        }

            font-size: 0.85rem;
            margin-top: 1rem;
            font-family: 'JetBrains Mono', monospace;

            border-left: 4px solid var(--accent-violet);
            padding: 1.5rem;
            margin: 1.5rem 0;
            border-radius: 4px;

            font-family: 'JetBrains Mono', monospace;

            border-radius: 3px;

            border: 1px solid var(--border-subtle);
            padding: 1.75rem;
            margin: 1.5rem 0;
            border-radius: 4px;
            border-left: 4px solid var(--accent-ember);
        }

        .argument-card h4 {

            margin-top: 0;
            margin-bottom: 1rem;

            border-radius: 4px;
            font-style: italic;
            color: var(--text-secondary);
            line-height: 1.7;

            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 1rem;
            font-style: normal;
            text-align: right;
            font-weight: 600;

            border: 1px solid var(--border-subtle);
            padding: 2rem;
            border-radius: 4px;
            margin: 2rem 0;

            color: var(--accent-gold);
            margin-top: 0;

            list-style: none;
            margin-left: 0;

        .further-reading li {
            margin-bottom: 1rem;

            margin-right: 0.5rem;
        }

        .further-reading a {
            color: var(--accent-gold);
        }

            border-radius: 4px;

            margin-bottom: 1rem;
        }

        .footer-section ul {
            list-style: none;
        }

        .footer-section li {
            margin-bottom: 0.5rem;
        }

        .footer-section a {
            color: var(--text-secondary);
            transition: color 0.3s ease;
        }

        .footer-section a:hover {
            color: var(--accent-gold);
        }@media (max-width: 768px) {
            h1 {

            }

            h2 {

            .container {

            }
