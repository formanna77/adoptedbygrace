<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>When God Says No — A Devotional on Unanswered Prayer</title>
    <meta name="description" content="Sometimes God says no. And His refusal is more loving than our yes would have been. A devotional meditation on unanswered prayer, trust, and the sovereignty of God.">
    <meta name="keywords" content="unanswered prayer, God's sovereignty, suffering, trust, divine providence, spiritual growth">

    <!-- OG Meta Tags -->
    <meta property="og:title" content="When God Says No — A Devotional on Unanswered Prayer">
    <meta property="og:description" content="Sometimes God says no. And His refusal is more loving than our yes would have been. Discover how God's sovereignty redeems even our deepest disappointments.">
    <meta property="og:image" content="https://adoptedbygrace.net/assets/og-devotional-when-god-says-no.png">
    <meta property="og:type" content="article">
    <meta property="og:url" content="https://adoptedbygrace.net/devotional-when-god-says-no.html">
    <meta name="twitter:card" content="summary_large_image">

    <!-- Canonical -->
    <link rel="canonical" href="https://adoptedbygrace.net/devotional-when-god-says-no.html">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="./favicon.svg">

    <!-- Stylesheets -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800;900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/global.css">
    <style>
        :root {
            --primary-dark: #0a0a0f;
            --accent-gold: #d4af37;
            --accent-ember: #e8845c;
            --accent-violet: #a78bce;
            --text-light: #e8e8e8;
            --text-muted: #a8a8a8;
            --border-dark: #2a2a2f;
        }

        body {
            background-color: var(--primary-dark);
            color: var(--text-light);
            font-family: 'Inter', sans-serif;
            line-height: 1.7;
        }

        /* Header & Navigation */
        header {
            background: linear-gradient(135deg, rgba(20, 20, 25, 0.95), rgba(10, 10, 15, 0.98));
            border-bottom: 1px solid var(--border-dark);
            position: sticky;
            top: 0;
            z-index: 50;
            padding: 1rem 0;
        }

        .nav-menu {
            display: flex;
            gap: 2rem;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .nav-menu a {
            color: var(--text-light);
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.3s;
            position: relative;
        }

        .nav-menu a:hover {
            color: var(--accent-gold);
        }

        .nav-menu a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -4px;
            left: 0;
            background: var(--accent-gold);
            transition: width 0.3s;
        }

        .nav-menu a:hover::after {
            width: 100%;
        }

        @media (max-width: 768px) {
            .nav-menu {
                display: none;
                position: absolute;
                top: 100%;
                left: 0;
                right: 0;
                flex-direction: column;
                background: var(--primary-dark);
                gap: 0;
                border-top: 1px solid var(--border-dark);
            }

            .nav-menu.active {
                display: flex;
            }

            .nav-menu li {
                padding: 1rem 1.5rem;
                border-bottom: 1px solid var(--border-dark);
            }
        }

        /* Main Content */
        main {
            max-width: 800px;
            margin: 3rem auto;
            padding: 0 1.5rem;
        }

        article {
            background: rgba(20, 20, 25, 0.6);
            border: 1px solid var(--border-dark);
            border-radius: 8px;
            padding: 3rem;
            line-height: 1.8;
        }

        .article-header {
            margin-bottom: 2.5rem;
            border-bottom: 2px solid var(--accent-gold);
            padding-bottom: 2rem;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            margin: 0 0 1rem 0;
            color: var(--accent-gold);
            line-height: 1.2;
        }

        .meta {
            color: var(--text-muted);
            font-size: 0.9rem;
            font-style: italic;
        }

        h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            color: var(--accent-violet);
            margin-top: 2.5rem;
            margin-bottom: 1.5rem;
        }

        p {
            margin: 1.3rem 0;
            color: var(--text-light);
        }

        .opening-meditation {
            background: rgba(212, 175, 55, 0.08);
            border-left: 4px solid var(--accent-gold);
            padding: 1.5rem;
            margin: 2rem 0;
            border-radius: 4px;
            font-style: italic;
            color: #e0d5b7;
        }

        .scripture-quote {
            background: rgba(167, 139, 206, 0.08);
            border-left: 4px solid var(--accent-violet);
            padding: 1.5rem;
            margin: 2rem 0;
            border-radius: 4px;
            font-style: italic;
            color: #e0d5b7;
            line-height: 1.9;
        }

        .scripture-ref {
            display: block;
            color: var(--accent-violet);
            font-weight: 600;
            margin-top: 0.8rem;
            font-style: normal;
        }

        .closing-prayer {
            background: rgba(232, 132, 92, 0.08);
            border-left: 4px solid var(--accent-ember);
            padding: 1.5rem;
            margin: 2.5rem 0 2rem 0;
            border-radius: 4px;
            font-style: italic;
            color: #e0d5b7;
            line-height: 1.9;
        }

        /* Further Reading Section */
        .further-reading {
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 2px solid var(--border-dark);
        }

        .further-reading h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            color: var(--accent-gold);
            margin-bottom: 1.5rem;
        }

        .reading-cards {
            display: grid;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .reading-card {
            background: rgba(20, 20, 25, 0.8);
            border: 1px solid var(--border-dark);
            border-radius: 6px;
            padding: 1.5rem;
            text-decoration: none;
            color: var(--text-light);
            transition: all 0.3s;
        }

        .reading-card:hover {
            border-color: var(--accent-gold);
            background: rgba(212, 175, 55, 0.1);
            transform: translateX(4px);
        }

        .reading-card h4 {
            font-family: 'Playfair Display', serif;
            margin: 0 0 0.5rem 0;
            color: var(--accent-gold);
            font-size: 1.1rem;
        }

        .reading-card p {
            margin: 0;
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        /* Banner Section */
        .never-gives-up-banner {
            background: linear-gradient(135deg, rgba(232, 132, 92, 0.15), rgba(167, 139, 206, 0.15));
            border: 1px solid var(--border-dark);
            border-radius: 8px;
            padding: 2rem;
            margin: 2.5rem 0;
            text-align: center;
        }

        .banner-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            color: var(--accent-gold);
            margin-bottom: 1rem;
        }

        .banner-text {
            color: var(--text-light);
            margin-bottom: 1.5rem;
        }

        .banner-cta {
            display: inline-block;
            background: linear-gradient(135deg, var(--accent-gold), var(--accent-ember));
            color: var(--primary-dark);
            padding: 0.8rem 2rem;
            border-radius: 4px;
            text-decoration: none;
            font-weight: 600;
            transition: transform 0.3s;
        }

        .banner-cta:hover {
            transform: scale(1.05);
        }

        .banner-cta:focus-visible {
            outline: 2px solid var(--accent-violet);
            outline-offset: 2px;
        }

        /* Accessibility */
        *:focus-visible {
            outline: 2px solid var(--accent-violet);
            outline-offset: 2px;
            border-radius: 2px;
        }

        /* Footer */
        footer {
            background: rgba(10, 10, 15, 0.95);
            border-top: 1px solid var(--border-dark);
            padding: 2rem 1.5rem;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 3rem;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }

            article {
                padding: 1.5rem;
            }

            h2 {
                font-size: 1.3rem;
            }

        }

    </style>
</head>
<body>

</body>
</html>
