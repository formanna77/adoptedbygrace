<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" fill="none">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4a254"/>
      <stop offset="100%" stop-color="#e8642c"/>
    </linearGradient>
    <linearGradient id="violetGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="900" height="200" rx="12" fill="#12121a" stroke="#d4a254" stroke-opacity="0.15" stroke-width="1"/>
  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" fill="#d4a254" font-family="serif" font-size="14" font-weight="700" letter-spacing="3" text-transform="uppercase">THE ORDER OF SALVATION — ORDO SALUTIS</text>
  <!-- Connection line -->
  <line x1="60" y1="110" x2="840" y2="110" stroke="url(#goldGrad)" stroke-width="2" stroke-opacity="0.3"/>
  <!-- Steps -->
  <!-- 1. Election -->
  <circle cx="80" cy="110" r="28" fill="#12121a" stroke="url(#goldGrad)" stroke-width="2" filter="url(#glow)"/>
  <text x="80" y="104" text-anchor="middle" fill="#d4a254" font-family="serif" font-size="11" font-weight="700">1</text>
  <text x="80" y="118" text-anchor="middle" fill="#f0ece4" font-family="sans-serif" font-size="7">ELECTION</text>
  <text x="80" y="158" text-anchor="middle" fill="#9a958c" font-family="sans-serif" font-size="8">Eph 1:4</text>
  <!-- 2. Predestination -->
  <circle cx="195" cy="110" r="28" fill="#12121a" stroke="url(#goldGrad)" stroke-width="2"/>
  <text x="195" y="104" text-anchor="middle" fill="#d4a254" font-family="serif" font-size="11" font-weight="700">2</text>
  <text x="195" y="118" text-anchor="middle" fill="#f0ece4" font-family="sans-serif" font-size="6.5">PREDESTINED</text>
  <text x="195" y="158" text-anchor="middle" fill="#9a958c" font-family="sans-serif" font-size="8">Rom 8:29</text>
  <!-- 3. Gospel Call -->
  <circle cx="310" cy="110" r="28" fill="#12121a" stroke="url(#goldGrad)" stroke-width="2"/>
  <text x="310" y="104" text-anchor="middle" fill="#d4a254" font-family="serif" font-size="11" font-weight="700">3</text>
  <text x="310" y="118" text-anchor="middle" fill="#f0ece4" font-family="sans-serif" font-size="7">CALLED</text>
  <text x="310" y="158" text-anchor="middle" fill="#9a958c" font-family="sans-serif" font-size="8">Rom 8:30</text>
  <!-- 4. Regeneration -->
  <circle cx="425" cy="110" r="28" fill="#12121a" stroke="url(#violetGrad)" stroke-width="2" filter="url(#glow)"/>
  <text x="425" y="104" text-anchor="middle" fill="#8b5cf6" font-family="serif" font-size="11" font-weight="700">4</text>
  <text x="425" y="118" text-anchor="middle" fill="#f0ece4" font-family="sans-serif" font-size="6.5">BORN AGAIN</text>
  <text x="425" y="158" text-anchor="middle" fill="#9a958c" font-family="sans-serif" font-size="8">John 3:3</text>
  <!-- 5. Faith -->
  <circle cx="540" cy="110" r="28" fill="#12121a" stroke="url(#violetGrad)" stroke-width="2"/>
  <text x="540" y="104" text-anchor="middle" fill="#8b5cf6" font-family="serif" font-size="11" font-weight="700">5</text>
  <text x="540" y="118" text-anchor="middle" fill="#f0ece4" font-family="sans-serif" font-size="7">FAITH</text>
  <text x="540" y="158" text-anchor="middle" fill="#9a958c" font-family="sans-serif" font-size="8">Eph 2:8</text>
  <!-- 6. Justified -->
  <circle cx="655" cy="110" r="28" fill="#12121a" stroke="url(#goldGrad)" stroke-width="2"/>
  <text x="655" y="104" text-anchor="middle" fill="#d4a254" font-family="serif" font-size="11" font-weight="700">6</text>
  <text x="655" y="118" text-anchor="middle" fill="#f0ece4" font-family="sans-serif" font-size="7">JUSTIFIED</text>
  <text x="655" y="158" text-anchor="middle" fill="#9a958c" font-family="sans-serif" font-size="8">Rom 5:1</text>
  <!-- 7. Sanctified -->
  <circle cx="770" cy="110" r="28" fill="#12121a" stroke="url(#goldGrad)" stroke-width="2"/>
  <text x="770" y="104" text-anchor="middle" fill="#d4a254" font-family="serif" font-size="11" font-weight="700">7</text>
  <text x="770" y="118" text-anchor="middle" fill="#f0ece4" font-family="sans-serif" font-size="6.5">SANCTIFIED</text>
  <text x="770" y="158" text-anchor="middle" fill="#9a958c" font-family="sans-serif" font-size="8">1 Thess 5:23</text>
  <!-- 8. Glorified -->
  <circle cx="845" cy="110" r="28" fill="#12121a" stroke="url(#goldGrad)" stroke-width="2.5" filter="url(#glow)"/>
  <text x="845" y="104" text-anchor="middle" fill="#d4a254" font-family="serif" font-size="11" font-weight="700">8</text>
  <text x="845" y="118" text-anchor="middle" fill="#f0ece4" font-family="sans-serif" font-size="7">GLORIFIED</text>
  <text x="845" y="158" text-anchor="middle" fill="#9a958c" font-family="sans-serif" font-size="8">Rom 8:30</text>
  <!-- Arrow indicators between circles -->
  <path d="M108,110 L167,110" stroke="#d4a254" stroke-width="1" stroke-opacity="0.5" marker-end="url(#arrowGold)"/>
  <text x="450" y="190" text-anchor="middle" fill="#5a5650" font-family="monospace" font-size="9" letter-spacing="2">THE GOLDEN CHAIN — ROMANS 8:29-30</text>
</svg>
