<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" fill="none">
  <defs>
    <linearGradient id="sGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4a254"/>
      <stop offset="100%" stop-color="#e8642c"/>
    </linearGradient>
    <linearGradient id="sViolet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <filter id="sGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="500" height="500" rx="16" fill="#0a0a0f"/>
  <!-- Center: Soli Deo Gloria -->
  <circle cx="250" cy="250" r="72" fill="#12121a" stroke="url(#sGold)" stroke-width="2.5" filter="url(#sGlow)"/>
  <text x="250" y="238" text-anchor="middle" fill="#d4a254" font-family="serif" font-size="14" font-weight="800">SOLI DEO</text>
  <text x="250" y="258" text-anchor="middle" fill="#d4a254" font-family="serif" font-size="14" font-weight="800">GLORIA</text>
  <text x="250" y="278" text-anchor="middle" fill="#9a958c" font-family="sans-serif" font-size="9">To God Alone</text>
  <text x="250" y="290" text-anchor="middle" fill="#9a958c" font-family="sans-serif" font-size="9">Be the Glory</text>
  <!-- Connecting lines -->
  <line x1="250" y1="178" x2="250" y2="88" stroke="#d4a254" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="319" y1="209" x2="393" y2="140" stroke="#d4a254" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="319" y1="291" x2="393" y2="360" stroke="#d4a254" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="181" y1="291" x2="107" y2="360" stroke="#d4a254" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="181" y1="209" x2="107" y2="140" stroke="#d4a254" stroke-width="1" stroke-opacity="0.3"/>
  <!-- Top: Sola Scriptura -->
  <circle cx="250" cy="65" r="50" fill="#12121a" stroke="url(#sViolet)" stroke-width="1.5"/>
  <text x="250" y="55" text-anchor="middle" fill="#8b5cf6" font-family="serif" font-size="11" font-weight="700">SOLA</text>
  <text x="250" y="70" text-anchor="middle" fill="#8b5cf6" font-family="serif" font-size="11" font-weight="700">SCRIPTURA</text>
  <text x="250" y="88" text-anchor="middle" fill="#9a958c" font-family="sans-serif" font-size="8">Scripture Alone</text>
  <!-- Top-right: Solus Christus -->
  <circle cx="410" cy="120" r="50" fill="#12121a" stroke="url(#sViolet)" stroke-width="1.5"/>
  <text x="410" y="110" text-anchor="middle" fill="#8b5cf6" font-family="serif" font-size="11" font-weight="700">SOLUS</text>
  <text x="410" y="125" text-anchor="middle" fill="#8b5cf6" font-family="serif" font-size="11" font-weight="700">CHRISTUS</text>
  <text x="410" y="143" text-anchor="middle" fill="#9a958c" font-family="sans-serif" font-size="8">Christ Alone</text>
  <!-- Bottom-right: Sola Gratia -->
  <circle cx="410" cy="380" r="50" fill="#12121a" stroke="url(#sViolet)" stroke-width="1.5"/>
  <text x="410" y="370" text-anchor="middle" fill="#8b5cf6" font-family="serif" font-size="11" font-weight="700">SOLA</text>
  <text x="410" y="385" text-anchor="middle" fill="#8b5cf6" font-family="serif" font-size="11" font-weight="700">GRATIA</text>
  <text x="410" y="403" text-anchor="middle" fill="#9a958c" font-family="sans-serif" font-size="8">Grace Alone</text>
  <!-- Bottom-left: Sola Fide -->
  <circle cx="90" cy="380" r="50" fill="#12121a" stroke="url(#sViolet)" stroke-width="1.5"/>
  <text x="90" y="370" text-anchor="middle" fill="#8b5cf6" font-family="serif" font-size="11" font-weight="700">SOLA</text>
  <text x="90" y="385" text-anchor="middle" fill="#8b5cf6" font-family="serif" font-size="11" font-weight="700">FIDE</text>
  <text x="90" y="403" text-anchor="middle" fill="#9a958c" font-family="sans-serif" font-size="8">Faith Alone</text>
  <!-- Top-left: empty fifth petal would be redundant; use for Sovereign Grace message -->
  <circle cx="90" cy="120" r="50" fill="#12121a" stroke="url(#sGold)" stroke-width="1.5"/>
  <text x="90" y="110" text-anchor="middle" fill="#d4a254" font-family="serif" font-size="10" font-weight="700">SOVEREIGN</text>
  <text x="90" y="125" text-anchor="middle" fill="#d4a254" font-family="serif" font-size="10" font-weight="700">GRACE</text>
  <text x="90" y="143" text-anchor="middle" fill="#9a958c" font-family="sans-serif" font-size="8">Eph 2:8-9</text>
  <!-- Bottom label -->
  <text x="250" y="475" text-anchor="middle" fill="#5a5650" font-family="monospace" font-size="9" letter-spacing="2">THE FIVE SOLAS OF THE REFORMATION</text>
</svg>
