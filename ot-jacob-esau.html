    <title>Jacob Over Esau: God's Sovereign Election Before Birth</title>
    <style>
        :root {
            --bg-deep: #0a0a0f;
            --bg-card: #12121a;
            --bg-card-hover: #1a1a2e;
            --accent-gold: #d4a254;
            --accent-ember: #e8642c;
            --accent-violet: #8b5cf6;
            --text-primary: #f0ece4;
            --text-secondary: #9a958c;
            --text-muted: #807b75;
            --border-subtle: rgba(212, 162, 84, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-primary);
            line-height: 1.8;
            font-size: 16px;
        }

        .breadcrumb-

        .breadcrumb-

        /* Reading Progress Bar */
        .reading-progress {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-gold), var(--accent-ember), var(--accent-violet));
            width: 0%;
            z-index: 99;
        }

        /* Main Content */
        #main-content {
            max-width: 900px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }

        .page-header {
            margin-bottom: 3rem;
            border-bottom: 1px solid var(--border-subtle);
            padding-bottom: 2rem;
        }

        .page-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 1rem;
            line-height: 1.2;
            background: linear-gradient(135deg, var(--accent-gold), var(--accent-ember));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .page-meta {
            color: var(--text-secondary);
            font-size: 0.95rem;
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .section-nav h3 {
            font-size: 0.85rem;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 0.1em;
            margin-bottom: 1rem;
            font-weight: 600;
        }

        .section-nav ol {
            list-style: none;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 1rem;
        }

        .section-

        .section-nav a:hover,
        .section-

        /* Content Sections */
        section {
            margin-bottom: 4rem;
            scroll-margin-top: 120px;
        }

        section h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: var(--accent-gold);
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        section h2::before {
            content: '';
            width: 4px;
            height: 2rem;
            background-color: var(--accent-gold);
            border-radius: 2px;
        }

        section h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 700;
            margin-top: 2rem;
            margin-bottom: 1rem;
            color: var(--accent-ember);
        }

        section p {
            margin-bottom: 1.5rem;
            color: var(--text-primary);
        }

        /* Scripture Blocks */
        .scripture-block {
            background-color: var(--bg-card);
            border-left: 4px solid var(--accent-gold);
            padding: 1.5rem;
            margin: 2rem 0;
            border-radius: 4px;
            font-style: italic;
            color: var(--text-secondary);
        }

        .scripture-block .ref {
            display: block;
            margin-top: 1rem;
            font-style: normal;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-family: 'JetBrains Mono', monospace;
        }

        /* Greek/Hebrew */
        .greek, .hebrew {
            font-family: 'JetBrains Mono', monospace;
            color: var(--accent-violet);
            font-weight: 600;
            background-color: rgba(139, 92, 246, 0.1);
            padding: 0.2rem 0.4rem;
            border-radius: 3px;
            margin: 0 0.2rem;
        }

        .transliteration {
            font-family: 'JetBrains Mono', monospace;
            color: var(--accent-gold);
            font-size: 0.95rem;
            font-weight: 500;
        }

        /* Callout Box */
        .callout {
            background-color: var(--bg-card-hover);
            border: 1px solid var(--border-subtle);
            border-left: 4px solid var(--accent-ember);
            padding: 1.5rem;
            margin: 2rem 0;
            border-radius: 4px;
        }

        .callout strong {
            color: var(--accent-ember);
            display: block;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.05em;
        }

        /* Lists */
        ul, ol {
            margin-left: 1.5rem;
            margin-bottom: 1.5rem;
        }

        li {
            margin-bottom: 0.75rem;
        }

        li strong {
            color: var(--accent-gold);
        }

        /* Objections Box */
        .objection {
            background-color: rgba(232, 100, 44, 0.08);
            border: 1px solid rgba(232, 100, 44, 0.2);
            padding: 1.5rem;
            margin: 1.5rem 0;
            border-radius: 4px;
        }

        .objection-title {
            font-weight: 700;
            color: var(--accent-ember);
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .objection-title::before {
            content: '✕';
            font-size: 1.2rem;
        }

        .objection-response {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(232, 100, 44, 0.2);
            color: var(--text-secondary);
        }

        .objection-response strong {
            color: var(--accent-gold);
        }

        /* Witness Quote */
        .witness-quote {
            background-color: var(--bg-card);
            border-left: 4px solid var(--accent-violet);
            padding: 1.5rem;
            margin: 1.5rem 0;
            border-radius: 4px;
            font-style: italic;
            color: var(--text-secondary);
        }

        .witness-quote .attribution {
            margin-top: 1rem;
            font-style: normal;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .attribution strong {
            color: var(--accent-violet);
        }

        /* Continue Exploring */
        .continue-exploring {
            background-color: var(--bg-card);
            border: 1px solid var(--border-subtle);
            padding: 2rem;
            border-radius: 8px;
            margin: 3rem 0;
        }

        .continue-exploring h3 {
            color: var(--accent-gold);
            margin-bottom: 1.5rem;
        }

        .explore-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 1rem;
        }

        .explore-link {
            background-color: var(--bg-card-hover);
            border: 1px solid var(--border-subtle);
            padding: 1rem;
            border-radius: 4px;
            text-decoration: none;
            color: var(--text-primary);
            transition: all 0.3s ease;
        }

        .explore-link:hover {
            background-color: var(--bg-deep);
            border-color: var(--accent-gold);
            color: var(--accent-gold);
        }

        .explore-link strong {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--accent-gold);
        }

        .explore-link span {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }/* Footer */
        footer {
            background-color: var(--bg-card);
            border-top: 1px solid var(--border-subtle);
            margin-top: 5rem;
            padding: 3rem 2rem;
        }

        .footer-container {
            max-width: 1200px; width: 100%;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 3rem;
            margin-bottom: 2rem;
        }

        .footer-section h4 {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            margin-bottom: 1rem;
            color: var(--accent-gold);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .footer-section ul {
            list-style: none;
            margin: 0;
        }

        .footer-section ul li {
            margin-bottom: 0.5rem;
        }

        .footer-section a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .footer-section a:hover {
            color: var(--accent-gold);
        }

        .footer-copyright {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border-subtle);
            max-width: 1200px; width: 100%;
            margin: 0 auto;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            #main-content {
                padding: 2rem 1rem;
            }

            .page-header h1 {
                font-size: 2rem;
            }

            section h2 {
                font-size: 1.6rem;
            }

            section h3 {
                font-size: 1.2rem;
            }

            .section-nav ol {
                grid-template-columns: 1fr;
            }

            }

        /* Structured Data */
        script[type="application/ld+json"] {
            display: none;
        }

/* ========== FOCUS STYLES ========== */
*:focus-visible { outline: 2px solid var(--accent-gold); outline-offset: 2px; border-radius: 2px; }
a:focus-visible { outline-offset: 3px; }
button:focus-visible, .tab-btn:focus-visible, .verse-badge:focus-visible { outline-offset: 2px; }

/* ========== SOCIAL SHARING ========== */
.share-buttons { display: flex; gap: 0.75rem; align-items: center; margin: 2rem 0; padding: 1.5rem; background: var(--bg-card, #12121a); border: 1px solid rgba(212, 162, 84, 0.12); border-radius: 8px; }
.share-buttons .share-label { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.15em; color: #9a958c; margin-right: 0.5rem; }
.share-btn { display: inline-flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 50%; border: 1px solid rgba(212, 162, 84, 0.2); background: transparent; color: #d4a254; text-decoration: none; font-size: 0.9rem; transition: all 0.3s ease; cursor: pointer; }
.share-btn:hover { background: rgba(212, 162, 84, 0.12); border-color: #d4a254; transform: translateY(-2px); }
.share-btn svg { width: 18px; height: 18px; fill: currentColor; }
        @media (max-width: 480px) {
            h1 { font-size: 1.8rem; }
            .page-hero { padding: 4.5rem 1rem 1.5rem; }
            .page-hero::before { width: 250px; height: 250px; }
            .content-section { padding: 1.5rem 1rem; }
            footer { margin-top: 2rem; padding: 1.5rem 1rem; }
            .btn-primary, .btn-secondary { padding: 0.8rem 1.8rem; font-size: 0.9rem; }
            .card { padding: 1.5rem; }
            blockquote, .scripture-block { padding: 1.2rem 1.3rem; }
        }

    </style>
