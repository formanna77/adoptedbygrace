  <text x="600" y="440" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#9a958c" font-style="italic">"He chose us in Him before the foundation of the world"</text>
  <text x="600" y="475" text-anchor="middle" font-family="monospace" font-size="14" fill="#807b75" letter-spacing="3">EPHESIANS 1:4</text>
  <!-- URL -->
  <text x="600" y="560" text-anchor="middle" font-family="monospace" font-size="16" fill="#807b75" letter-spacing="2">adoptedbygrace.net</text>
