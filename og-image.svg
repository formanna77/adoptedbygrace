<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#12121a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d4a254"/>
      <stop offset="100%" stop-color="#e8642c"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Border accent -->
  <rect x="20" y="20" width="1160" height="590" rx="8" fill="none" stroke="#d4a254" stroke-width="1" opacity="0.3"/>
  <!-- Cross subtle -->
  <line x1="600" y1="80" x2="600" y2="200" stroke="#d4a254" stroke-width="2" opacity="0.2"/>
  <line x1="550" y1="130" x2="650" y2="130" stroke="#d4a254" stroke-width="2" opacity="0.2"/>
  <!-- Title -->
  <text x="600" y="290" text-anchor="middle" font-family="Georgia, serif" font-size="64" font-weight="700" fill="#f0ece4">ADOPTED BY GRACE</text>
  <!-- Subtitle -->
  <text x="600" y="350" text-anchor="middle" font-family="Georgia, serif" font-size="24" fill="#d4a254" letter-spacing="6">THE BIBLICAL CASE FOR DIVINE ELECTION</text>
  <!-- Divider -->
  <line x1="400" y1="390" x2="800" y2="390" stroke="#d4a254" stroke-width="1" opacity="0.4"/>
