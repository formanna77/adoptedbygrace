<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Support the ministry of Adopted by Grace. Help us spread the doctrines of sovereign grace to God's elect worldwide. 100% free and ad-free content.">
    <meta name="theme-color" content="#0a0a0f">

    <!-- Open Graph Tags -->
    <meta property="og:title" content="Support This Ministry – Adopted by Grace">
    <meta property="og:description" content="Help us reach more of God's people with the truths of sovereign grace. Every gift is ordained and matters.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://adoptedbygrace.net/donate.html">
    <link rel="canonical" href="https://adoptedbygrace.net/donate.html">

    <meta property="og:image" content="https://adoptedbygrace.net/og-image.png">

    <title>Support This Ministry – Adopted by Grace</title>

    <style>
        :root {
            --bg-deep: #0a0a0f;
            --bg-card: #12121a;
            --bg-card-hover: #1a1a2e;
            --accent-gold: #d4a254;
            --accent-ember: #e8642c;
            --accent-violet: #8b5cf6;
            --text-primary: #f0ece4;
            --text-secondary: #9a958c;
            --text-muted: #807b75;
            --border-subtle: rgba(212, 162, 84, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Focus visible */
        *:focus-visible {
            outline: 2px solid var(--accent-gold);
            outline-offset: 2px;
            border-radius: 2px;
        }

        /* Main content */
        main {
            max-width: 1200px; width: 100%;
            margin: 0 auto;
            padding: 0 2rem;
        }

        /* Hero Section */
        .hero {
            text-align: center;
            padding: 3.5rem 2rem;
            background: linear-gradient(135deg, rgba(212, 162, 84, 0.08) 0%, rgba(139, 92, 246, 0.04) 100%);
            border-bottom: 1px solid var(--border-subtle);
            margin: 0 -2rem;
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: var(--accent-gold);
            letter-spacing: -1px;
        }

        .hero p {
            font-size: 1.3rem;
            color: var(--text-secondary);
            margin-bottom: 2rem;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.8;
        }

        .hero-verse {
            font-style: italic;
            color: var(--text-muted);
            font-size: 1rem;
            margin-top: 2rem;
            padding: 1.5rem;
            border-left: 3px solid var(--accent-gold);
            background: rgba(212, 162, 84, 0.05);
            border-radius: 4px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .hero-verse strong {
            color: var(--accent-gold);
            font-style: normal;
        }

        @media (max-width: 968px) {
            .hero {
                padding: 2.5rem 1.5rem;
            }

            .hero h1 {
                font-size: 2.2rem;
            }

            .hero p {
                font-size: 1.1rem;
            }

            .section {
                padding: 2rem 0;
            }

            .donate-section {
                padding: 1.75rem 1rem;
                margin: 1.5rem 0;
            }
        }

        /* Sections */
        .section {
            padding: 3rem 0;
            border-bottom: 1px solid var(--border-subtle);
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 2rem;
            color: var(--accent-gold);
            text-align: center;
            letter-spacing: -0.5px;
        }

        /* Mission Section */
        .mission-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .mission-card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            padding: 2rem;
            transition: all 0.3s ease;
        }

        .mission-card:hover {
            background: var(--bg-card-hover);
            border-color: var(--accent-gold);
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(212, 162, 84, 0.1);
        }

        .mission-icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            display: inline-block;
        }

        .mission-card h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            margin-bottom: 0.8rem;
            color: var(--accent-gold);
        }

        .mission-card p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.7;
        }

        /* Donate Button Section */
        .donate-section {
            text-align: center;
            padding: 2.5rem 1.5rem;
            background: linear-gradient(135deg, rgba(212, 162, 84, 0.12) 0%, rgba(139, 92, 246, 0.06) 100%);
            border-radius: 12px;
            margin: 2rem 0;
            border: 1px solid var(--border-subtle);
        }

        .donate-button-wrapper {
            margin: 2rem 0;
        }

        .donate-btn {
            display: inline-block;
            padding: 1.2rem 3rem;
            background: linear-gradient(135deg, #d4a254 0%, #c99344 100%);
            color: var(--bg-deep);
            text-decoration: none;
            border: none;
            border-radius: 8px;
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 24px rgba(212, 162, 84, 0.3);
            letter-spacing: -0.5px;
        }

        .donate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(212, 162, 84, 0.4);
        }

        .donate-btn:active {
            transform: translateY(0);
        }

        .donate-message {
            color: var(--text-secondary);
            font-size: 1.05rem;
            margin-top: 2rem;
            font-style: italic;
            line-height: 1.8;
        }

        /* Other Ways Section */
        .ways-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .way-card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            padding: 2rem;
            text-align: center;
            transition: all 0.3s ease;
        }

        .way-card:hover {
            background: var(--bg-card-hover);
            border-color: var(--accent-violet);
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(139, 92, 246, 0.15);
        }

        .way-emoji {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .way-card h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            margin-bottom: 0.8rem;
            color: var(--accent-gold);
        }

        .way-card p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 1.2rem;
            line-height: 1.6;
        }

        .way-link {
            display: inline-block;
            padding: 0.6rem 1.5rem;
            background: rgba(212, 162, 84, 0.15);
            color: var(--accent-gold);
            text-decoration: none;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.2s;
            border: 1px solid var(--accent-gold);
        }

        .way-link:hover {
            background: rgba(212, 162, 84, 0.25);
            transform: translateX(2px);
        }

        /* Thank You Section */
        .thank-you {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            padding: 3rem;
            text-align: center;
            margin: 3rem 0;
        }

        .thank-you h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            margin-bottom: 1.5rem;
            color: var(--accent-gold);
        }

        .thank-you p {
            color: var(--text-secondary);
            font-size: 1.05rem;
            line-height: 1.9;
            max-width: 700px;
            margin: 0 auto;
        }

        /* Humor section */
        .humor-box {
            background: rgba(139, 92, 246, 0.08);
            border-left: 3px solid var(--accent-violet);
            padding: 1.5rem;
            border-radius: 4px;
            margin: 2rem 0;
            color: var(--text-secondary);
            font-style: italic;
        }

        .humor-box strong {
            color: var(--accent-violet);
            font-style: normal;
        }

        /* Footer */
        footer {
            background: var(--bg-card);
            border-top: 1px solid var(--border-subtle);
            margin-top: 5rem;
            padding: 3rem 2rem 1rem;
        }

        .footer-container {
            max-width: 1200px; width: 100%;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .footer-section h4 {
            font-family: 'Playfair Display', serif;
            color: var(--accent-gold);
            margin-bottom: 1rem;
            font-size: 1.1rem;
            letter-spacing: -0.5px;
        }

        .footer-section ul {
            list-style: none;
        }

        .footer-section li {
            margin-bottom: 0.7rem;
        }

        .footer-section a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.2s;
        }

        .footer-section a:hover {
            color: var(--accent-gold);
        }

        .footer-copyright {
            text-align: center;
            color: var(--text-muted);
            padding-top: 2rem;
            border-top: 1px solid var(--border-subtle);
            font-size: 0.9rem;
        }

        /* Back to Top Button */
        @media (max-width: 968px) {
            .ways-grid,
            .mission-grid {
                grid-template-columns: 1fr;
            }

            .donate-section {
                padding: 1.5rem 1rem;
            }

            .donate-btn {
                padding: 1rem 2rem;
                font-size: 1.2rem;
            }

            .thank-you {
                padding: 1.5rem 1rem;
            }

            .footer-container {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }

            main {
                padding: 0 1rem;
            }
        }

        @media (max-width: 480px) {
            .hero {
                padding: 1.75rem 1rem;
            }

            .hero h1 {
                font-size: 2rem;
            }

            .hero p {
                font-size: 1rem;
            }

            main {
                padding: 0 0.75rem;
            }

            .section {
                padding: 1.5rem 0;
            }

            .ways-grid,
            .mission-grid {
                grid-template-columns: 1fr;
            }

            .donate-section {
                padding: 1.25rem 0.75rem;
                margin: 1rem 0;
            }

            .donate-btn {
                padding: 0.85rem 1.5rem;
                font-size: 1rem;
            }

            .thank-you {
                padding: 1.25rem 0.75rem;
            }
        }

    </style>

        

    <script src="/nav.js"></script>
</body>
</html>
