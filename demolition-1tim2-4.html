    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-deep: #0a0a0f;
            --bg-card: #12121a;
            --bg-card-hover: #1a1a2e;
            --accent-gold: #d4a254;
            --accent-ember: #e8642c;
            --accent-violet: #8b5cf6;
            --text-primary: #f0ece4;
            --text-secondary: #9a958c;
            --text-muted: #807b75;
            --border-subtle: rgba(212, 162, 84, 0.12);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-primary);
            line-height: 1.8;
        }

        a {
            color: var(--accent-gold);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        a:hover {
            color: var(--accent-ember);
        }

        /* Reading Progress Bar */
        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-gold), var(--accent-ember), var(--accent-violet));
            z-index: 1000;
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.1s ease;
        }

        /* Main Content */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 2rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .back-link:hover {
            color: var(--accent-gold);
        }

        /* Series Labels */
        .series-label {
            display: inline-block;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 2px;
            color: var(--accent-violet);
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .tier-badge {
            display: inline-block;
            background-color: var(--bg-card);
            border: 1px solid var(--border-subtle);
            padding: 0.75rem 1.5rem;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: var(--accent-gold);
            margin-bottom: 1.5rem;
        }

        .topic-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
            letter-spacing: 1px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 1rem;
            color: var(--text-primary);
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: 3rem;
            line-height: 1.6;
        }

        .section-nav-list {
            list-style: none;
            display: flex;
            gap: 2rem;
            max-width: 1200px; width: 100%;
            margin: 0 auto;
            padding: 0 2rem;
            white-space: nowrap;
        }

        .section-nav-list a {
            font-size: 0.9rem;
            color: var(--text-secondary);
            transition: color 0.3s ease;
        }

        .section-nav-list a:hover,
        .section-nav-list a.active {
            color: var(--accent-gold);
        }

        @media (max-width: 1024px) {

            .section-nav-list {
                gap: 1rem;
                padding: 0;
                font-size: 0.8rem;
            }
        }

        /* Content Sections */
        section {
            margin-bottom: 4rem;
        }

        h2 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.5rem, 4vw, 2.25rem);
            font-weight: 700;
            margin-top: 2rem;
            margin-bottom: 1.5rem;
            color: var(--text-primary);
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border-subtle);
        }

        h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            font-weight: 700;
            margin-top: 1.5rem;
            margin-bottom: 1rem;
            color: var(--accent-gold);
        }

        p {
            margin-bottom: 1.2rem;
            color: var(--text-primary);
        }

        .scripture-block {
            background-color: var(--bg-card);
            border-left: 4px solid var(--accent-gold);
            padding: 1.5rem;
            margin: 2rem 0;
            border-radius: 4px;
            font-style: italic;
            line-height: 1.8;
            color: var(--text-primary);
        }

        .scripture-ref {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 0.75rem;
            font-style: normal;
        }

        .greek-box {
            background-color: rgba(139, 92, 246, 0.08);
            border: 1px solid rgba(139, 92, 246, 0.3);
            padding: 1.5rem;
            margin: 1.5rem 0;
            border-radius: 4px;
        }

        .greek-term {
            font-family: 'JetBrains Mono', monospace;
            color: var(--accent-violet);
            font-weight: 600;
        }

        .argument-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-subtle);
            padding: 2rem;
            margin: 2rem 0;
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        .argument-card:hover {
            background-color: var(--bg-card-hover);
            border-color: var(--accent-gold);
        }

        .argument-card h4 {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--accent-gold);
            margin-bottom: 0.75rem;
        }

        .argument-card p {
            color: var(--text-primary);
        }

        .witness-quote {
            background-color: var(--bg-card);
            border-left: 4px solid var(--accent-ember);
            padding: 1.5rem;
            margin: 1.5rem 0;
            border-radius: 4px;
            font-style: italic;
        }

        .witness-attribution {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 1rem;
            font-style: normal;
        }

        .further-reading {
            background-color: var(--bg-card);
            border: 1px solid var(--border-subtle);
            padding: 2rem;
            border-radius: 4px;
            margin: 2rem 0;
        }

        .further-reading h4 {
            color: var(--accent-gold);
            margin-bottom: 1rem;
        }

        .further-reading ul {
            list-style: none;
        }

        .further-reading li {
            margin-bottom: 0.75rem;
            padding-left: 1rem;
            position: relative;
        }

        .further-reading li:before {
            content: "→";
            position: absolute;
            left: 0;
            color: var(--accent-gold);
        }

        .further-reading a {
            color: var(--accent-gold);
        }

        /* Next Article Teaser */
        .next-article {
            background-color: var(--bg-card);
            border: 1px solid var(--border-subtle);
            padding: 2rem;
            border-radius: 4px;
            margin: 3rem 0;
            text-align: center;
        }

        .next-article h4 {
            color: var(--accent-violet);
            margin-bottom: 1rem;
        }

        .next-article p {
            margin-bottom: 1.5rem;
        }

        .next-button {
            display: inline-block;
            background-color: var(--accent-gold);
            color: var(--bg-deep);
            padding: 0.75rem 2rem;
            border-radius: 4px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .next-button:hover {
            background-color: var(--accent-ember);
        }

        /* Share Buttons */
        .share-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin: 2rem 0;
            flex-wrap: wrap;
        }

        .share-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            background-color: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 4px;
            color: var(--text-secondary);
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .share-btn:hover {
            background-color: var(--bg-card-hover);
            border-color: var(--accent-gold);
            color: var(--accent-gold);
        }

        /* Footer */
        footer {
            background-color: rgba(10, 10, 15, 0.95);
            border-top: 1px solid var(--border-subtle);
            padding: 3rem 2rem;
            margin-top: 2rem;
        }

        .footer-container {
            max-width: 1200px; width: 100%;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .footer-section h4 {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            color: var(--accent-gold);
            margin-bottom: 1rem;
        }

        .footer-section ul {
            list-style: none;
        }

        .footer-section li {
            margin-bottom: 0.5rem;
        }

        .footer-section a {
            color: var(--text-secondary);
            transition: color 0.3s ease;
        }

        .footer-section a:hover {
            color: var(--accent-gold);
        }

        .footer-copyright {
            text-align: center;
            padding-top: 2rem;
            border-top: 1px solid var(--border-subtle);
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* Back to Top Button */@media (max-width: 1024px) {
            .container {
                padding: 2rem 1.5rem;
            }

            .argument-card {
                padding: 1.5rem;
            }

            }

        @media (max-width: 768px) {
            .container {
                padding: 1.5rem 1rem;
            }

            h1 {
                font-size: 1.5rem;
                margin-bottom: 1rem;
            }

            h2 {
                font-size: 1.3rem;
                margin-top: 2rem;
                margin-bottom: 1rem;
            }

            h3 {
                font-size: 1.1rem;
                margin-top: 1rem;
                margin-bottom: 0.6rem;
            }

            .argument-card {
                padding: 1.2rem;
                margin-bottom: 1.5rem;
            }

            .share-buttons {
                gap: 0.6rem;
                margin-top: 2rem;
            }

            footer {
                padding: 1.5rem 1rem;
                margin-top: 5rem;
            }

            .related-explore {
                margin: 2rem auto;
                padding: 1.2rem;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 1rem;
            }

            h1 {
                font-size: 1.3rem;
                margin-bottom: 0.8rem;
            }

            h2 {
                font-size: 1.1rem;
                margin-top: 1.2rem;
                margin-bottom: 0.8rem;
            }

            h3 {
                font-size: 0.95rem;
                margin-top: 0.8rem;
                margin-bottom: 0.5rem;
            }

            .argument-card {
                padding: 1rem;
                margin-bottom: 1rem;
            }

            .share-buttons {
                gap: 0.5rem;
                margin-top: 1rem;
            }

            .share-btn {
                width: 32px;
                height: 32px;
                font-size: 0.8rem;
            }

            footer {
                padding: 1.2rem 0.8rem;
                margin-top: 5rem;
            }

            .footer-section h4 {
                font-size: 1rem;
                margin-bottom: 0.8rem;
            }

            .footer-copyright {
                font-size: 0.75rem;
            }

            .related-explore {
                margin: 1.5rem auto;
                padding: 1rem;
            }

            .related-explore h3 {
                font-size: 1rem;
                margin-bottom: 1rem;
            }

            .related-explore-grid {
                grid-template-columns: 1fr;
                gap: 0.6rem;
            }
        }

        .breadcrumb-
