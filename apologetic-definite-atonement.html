<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Did Jesus die for everyone? Scripture teaches that Christ's death was particular and effective—he died for his sheep, his church, his people. Explore the biblical case for definite atonement.">
    <meta name="keywords" content="atonement, particular atonement, definite atonement, limited atonement, John Owen, John 10, Christ's death, sovereignty, grace">
    <meta name="author" content="Adopted by Grace">
    <meta property="og:title" content="Did Jesus Die for Everyone? | Scripture on Definite Atonement">
    <meta property="og:description" content="Explore what Scripture really teaches about Christ's death: particular, effective, and the foundation of our assurance.">
    <meta property="og:url" content="https://adoptedbygrace.net/apologetic-definite-atonement">
    <meta property="og:image" content="https://adoptedbygrace.net/og-image.jpg">
    <meta property="og:type" content="article">
    <link rel="canonical" href="https://adoptedbygrace.net/apologetic-definite-atonement">
    <title>Did Jesus Die for Everyone? Scripture on Definite Atonement | Adopted by Grace</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800;900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/global.css">

    <style>
        :root {
            --bg-deep: #0a0a0f;
            --bg-card: #12121a;
            --bg-card-hover: #1a1a2e;
            --accent-gold: #d4a254;
            --accent-ember: #e8642c;
            --accent-violet: #8b5cf6;
            --text-primary: #e8e8f0;
            --text-secondary: #a8a8b8;
            --border-color: #2a2a3e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-primary);
            line-height: 1.8;
        }

        /* Reading Progress Bar */
        .reading-progress {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-gold), var(--accent-violet));
            width: 0%;
            z-index: 1000;
        }

        /* Skip to Content */
        .skip-content {
            position: absolute;
            top: -40px;
            left: 0;
            background: var(--accent-gold);
            color: var(--bg-deep);
            padding: 8px 16px;
            text-decoration: none;
            font-weight: 600;
            z-index: 999;
        }

        .skip-content:focus {
            top: 0;
        }

        /* Hero Section */
        .hero {
            background: linear-gradient(135deg, #1a1a2e 0%, #0d0d12 100%);
            padding: 120px 20px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 700;
            color: var(--accent-gold);
            margin-bottom: 24px;
            line-height: 1.2;
        }

        .hero .subtitle {
            font-size: clamp(1.1rem, 3vw, 1.4rem);
            color: var(--text-secondary);
            max-width: 700px;
            margin: 0 auto 40px;
            font-style: italic;
        }

        .hero .emphasis {
            color: var(--accent-ember);
            font-weight: 600;
        }

        /* Main Content */
        main {
            max-width: 900px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        .section {
            margin-bottom: 80px;
        }

        .section h2 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.8rem, 5vw, 2.8rem);
            color: var(--accent-gold);
            margin-bottom: 24px;
            line-height: 1.3;
        }

        .section h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            color: var(--accent-violet);
            margin-top: 32px;
            margin-bottom: 16px;
        }

        .section p {
            margin-bottom: 18px;
            color: var(--text-primary);
            font-size: 1.05rem;
        }

        .scripture-quote {
            background-color: var(--bg-card);
            border-left: 4px solid var(--accent-gold);
            padding: 24px;
            margin: 32px 0;
            border-radius: 4px;
            font-style: italic;
            color: var(--text-secondary);
            line-height: 1.9;
        }

        .verse-ref {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            color: var(--accent-violet);
            display: block;
            margin-top: 12px;
            font-style: normal;
        }

        .verse-ref a {
            color: var(--accent-violet);
            text-decoration: none;
        }

        .verse-ref a:hover {
            text-decoration: underline;
        }

        .highlight {
            color: var(--accent-ember);
            font-weight: 600;
        }

        .analogy-box {
            background-color: rgba(139, 92, 246, 0.1);
            border: 1px solid var(--accent-violet);
            padding: 24px;
            border-radius: 4px;
            margin: 32px 0;
        }

        .analogy-label {
            font-weight: 600;
            color: var(--accent-violet);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .banner-section {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.1), rgba(232, 100, 44, 0.1));
            border: 1px solid var(--accent-violet);
            padding: 48px 32px;
            border-radius: 8px;
            margin: 60px 0;
            text-align: center;
        }

        .banner-section h3 {
            font-size: 2rem;
            margin-bottom: 16px;
            margin-top: 0;
        }

        .banner-section p {
            font-size: 1.1rem;
            margin-bottom: 24px;
        }

        .banner-section a {
            display: inline-block;
            background-color: var(--accent-violet);
            color: var(--bg-deep);
            padding: 12px 28px;
            text-decoration: none;
            border-radius: 4px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .banner-section a:hover {
            background-color: var(--accent-gold);
        }

        .related-links {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }

        .link-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 24px;
            border-radius: 4px;
            text-decoration: none;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
        }

        .link-card:hover {
            background-color: var(--bg-card-hover);
            border-color: var(--accent-gold);
            transform: translateY(-4px);
        }

        .link-card h4 {
            color: var(--accent-gold);
            margin-bottom: 8px;
            font-size: 1.1rem;
        }

        .link-card p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 0;
        }

        /* Footer */
        footer {
            background-color: var(--bg-card);
            border-top: 1px solid var(--border-color);
            padding: 60px 20px 20px;
            margin-top: 80px;
        }

        .footer-container {
            max-width: 1000px;
            margin: 0 auto 40px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 40px;
        }

        .footer-section h4 {
            color: var(--accent-gold);
            margin-bottom: 16px;
            font-size: 1rem;
        }

        .footer-section ul {
            list-style: none;
        }

        .footer-section a {
            color: var(--text-secondary);
            text-decoration: none;
            display: block;
            margin-bottom: 12px;
            transition: all 0.3s;
        }

        .footer-section a:hover {
            color: var(--accent-gold);
            padding-left: 8px;
        }

        .footer-copyright {
            text-align: center;
            color: var(--text-secondary);
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
        }

        /* Responsive */
        @media (max-width: 768px) {

            .hero {
                padding: 80px 20px;
            }

            main {
                padding: 40px 20px;
            }

            .banner-section {
                padding: 32px 20px;
            }

            }

    </style>
</head>
<body>
    

    <script src="/nav.js"></script>
</body>
</html>
